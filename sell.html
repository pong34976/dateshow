<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>โอนเวร</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg: #0f0c29;
      --bg2: radial-gradient(ellipse at 20% 0%, #302060 0%, #0f0c29 65%);
      --hdr: rgba(255,255,255,.05);
      --hdr-txt: #fff;
      --day-lbl: rgba(255,255,255,.45);
      --cell: rgba(255,255,255,.03);
      --cell-hov: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.08);
      --txt: #ddd;
      --nav: rgba(255,255,255,.12);
      --nav-hov: rgba(255,255,255,.24);
      --accent: #ff9800;
      --today-ring: #ff9800;
      --sun: #ff6b6b;
      --sat: #80b0ff;
      --shadow: 0 8px 40px rgba(0,0,0,.55);
      --radius: 18px;
      --modal-bg: #1a1530;
    }
    .t-coffee { --bg:#1c140d; --bg2:radial-gradient(ellipse at 20% 0%,#3d2b1f,#1c140d 65%); --hdr:rgba(215,204,200,.08); --hdr-txt:#efebe9; --day-lbl:rgba(188,170,164,.6); --cell:rgba(215,204,200,.05); --cell-hov:rgba(215,204,200,.1); --border:rgba(141,110,99,.2); --txt:#d7ccc8; --nav:rgba(141,110,99,.15); --nav-hov:rgba(141,110,99,.3); --accent:#a1887f; --today-ring:#ff5722; --sun:#ff5252; --sat:#64b5f6; --modal-bg:#2b1f1a; }
    .t-dark   { --bg:#000; --bg2:radial-gradient(ellipse at 20% 0%,#0a0a0a,#000 65%); --hdr:rgba(0,255,255,.05); --hdr-txt:#fff; --day-lbl:rgba(255,255,255,.4); --cell:rgba(255,255,255,.03); --cell-hov:rgba(0,255,255,.1); --border:rgba(255,255,255,.1); --txt:#e0e0e0; --nav:rgba(255,255,255,.08); --nav-hov:rgba(0,255,255,.2); --accent:#00bcd4; --today-ring:#00bcd4; --sun:#ff1744; --sat:#2979ff; --modal-bg:#0a0a0a; }
    .t-candy  { --bg:#2d0a1c; --bg2:radial-gradient(ellipse at 20% 0%,#5c1839,#2d0a1c 65%); --hdr:rgba(255,64,129,.18); --hdr-txt:#fff; --day-lbl:#ff80ab; --cell:rgba(255,128,171,.1); --cell-hov:rgba(255,64,129,.22); --border:rgba(255,128,171,.25); --txt:#ffe0eb; --nav:rgba(255,64,129,.25); --nav-hov:rgba(255,64,129,.45); --accent:#ff4081; --today-ring:#ff1744; --sun:#ff1744; --sat:#f50057; --modal-bg:#3d0d25; }
    .t-paper  { --bg:#fdfaf0; --bg2:linear-gradient(135deg,#fff,#f2ead3); --hdr:rgba(93,64,55,.08); --hdr-txt:#3e2723; --day-lbl:#5d4037; --txt:#261a15; --cell:rgba(255,255,255,.9); --cell-hov:rgba(93,64,55,.1); --border:#d7ccc8; --nav:rgba(93,64,55,.12); --nav-hov:rgba(93,64,55,.25); --accent:#e65100; --today-ring:#bf360c; --sun:#d32f2f; --sat:#1976d2; --modal-bg:#f0eadd; }
    :root { --c-joe:#a78bfa; --c-wan:#34d399; --c-flook:#60a5fa; --c-ae:#fbbf24; }

    body { font-family:'Sarabun',sans-serif; background:var(--bg2,var(--bg)); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px 12px 40px; transition:background .4s; }

    .topbar { width:100%; max-width:1100px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .app-title { font-size:1.1rem; font-weight:700; color:var(--hdr-txt); letter-spacing:.5px; display:flex; align-items:center; gap:8px; }
    .app-title .badge { font-size:.72rem; background:#e65100; color:#fff; padding:2px 8px; border-radius:20px; font-weight:600; }
    .theme-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .swatch { width:24px; height:24px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:transform .2s,border-color .2s; box-shadow:0 2px 6px rgba(0,0,0,.4); }
    .swatch:hover { transform:scale(1.2); }
    .swatch.active { border-color:#fff; transform:scale(1.15); }

    @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* Steps */
    .steps { width:100%; max-width:1100px; display:flex; align-items:center; gap:10px; margin-bottom:20px; }
    .step-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; background:rgba(255,255,255,.08); color:var(--day-lbl); border:2px solid var(--border); transition:all .3s; flex-shrink:0; }
    .step-dot.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 0 12px var(--accent); }
    .step-dot.done   { background:#00897b; color:#fff; border-color:#00897b; }
    .step-line { flex:1; height:2px; background:var(--border); border-radius:2px; }
    .step-label { font-size:.78rem; color:var(--day-lbl); white-space:nowrap; }

    /* Step 1: Seller */
    #step1 { width:100%; max-width:480px; background:var(--cell); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:32px 28px; text-align:center; animation:fadein .35s ease; }
    .step1-title { font-size:1.3rem; font-weight:700; color:var(--hdr-txt); margin-bottom:6px; }
    .step1-sub   { font-size:.88rem; color:var(--day-lbl); margin-bottom:26px; }
    .req-grid    { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .req-btn { padding:20px 12px; border-radius:14px; border:2px solid transparent; font-family:'Sarabun',sans-serif; font-size:1.1rem; font-weight:700; cursor:pointer; background:rgba(255,255,255,.06); transition:transform .18s,box-shadow .18s; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .req-btn:hover { transform:scale(1.07); box-shadow:0 6px 22px rgba(0,0,0,.4); background:rgba(255,255,255,.1); }
    .req-btn .req-icon { font-size:2rem; }

    /* Step 2: Calendar */
    #step2 { width:100%; max-width:1100px; animation:fadein .35s ease; display:none; }
    .seller-banner { width:100%; background:rgba(230,81,0,.18); border:1px solid rgba(230,81,0,.4); border-radius:12px; padding:10px 18px; margin-bottom:14px; display:flex; align-items:center; gap:10px; font-size:.92rem; color:var(--hdr-txt); }
    .seller-banner strong { color:#ffb74d; }
    .hint-txt { font-size:.82rem; color:var(--day-lbl); margin-bottom:10px; text-align:center; }
    .change-btn { margin-left:auto; background:none; border:1px solid rgba(230,81,0,.5); color:#ffb74d; border-radius:8px; padding:4px 12px; cursor:pointer; font-family:'Sarabun',sans-serif; font-size:.8rem; transition:background .2s; }
    .change-btn:hover { background:rgba(230,81,0,.2); }

    .calendar { width:100%; background:var(--cell); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--border); backdrop-filter:blur(14px); }
    .cal-header { background:var(--hdr); padding:20px 26px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); gap:12px; flex-wrap:wrap; }
    .cal-title { font-size:1.55rem; font-weight:700; color:var(--hdr-txt); letter-spacing:.3px; }
    .cal-title span { color:var(--accent); }
    .nav-group { display:flex; gap:8px; align-items:center; }
    .nav-btn { background:var(--nav); color:var(--hdr-txt); border:1px solid var(--border); border-radius:50%; width:40px; height:40px; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s,transform .15s; }
    .nav-btn:hover { background:var(--nav-hov); transform:scale(1.1); box-shadow:0 0 10px var(--accent); }
    .today-btn { padding:7px 16px; border-radius:20px; background:var(--accent); color:#fff; border:none; font-family:'Sarabun',sans-serif; font-size:.88rem; cursor:pointer; transition:opacity .2s,transform .15s; }
    .today-btn:hover { opacity:.8; transform:scale(1.05); }
    .day-labels { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); background:var(--hdr); border-bottom:1px solid var(--border); }
    .day-lbl { text-align:center; padding:10px 0; font-size:.75rem; font-weight:700; letter-spacing:1px; color:var(--day-lbl); text-transform:uppercase; }
    .day-lbl.sun { color:var(--sun); }
    .day-lbl.sat { color:var(--sat); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); animation:fadein .3s ease; }
    .cal-cell { min-height:130px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:8px 6px 6px; display:flex; flex-direction:column; gap:3px; transition:background .2s; position:relative; }
    .cal-cell:nth-child(7n) { border-right:none; }
    .cal-cell:hover { background:var(--cell-hov); }
    .cal-cell.other-month { opacity:.25; pointer-events:none; }
    .cal-cell.is-today::after { content:''; position:absolute; inset:0; pointer-events:none; border:2px solid var(--today-ring); border-radius:2px; opacity:.5; }
    .day-num { font-size:.9rem; font-weight:700; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--txt); transition:background .2s,color .2s; margin-bottom:4px; }
    .cal-cell.is-today .day-num { background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#000)); color:#fff; box-shadow:0 3px 10px rgba(0,0,0,.4); }
    .cal-cell.is-sun .day-num { color:var(--sun); }
    .cal-cell.is-sat .day-num { color:var(--sat); }
    .cal-cell.is-sun, .cal-cell.is-holiday { background:rgba(255,107,107,.05); }
    .cal-cell.is-sat { background:rgba(128,176,255,.05); }
    .shifts { display:flex; flex-direction:column; gap:4px; flex:1; }
    .holiday-label { font-size:.65rem; font-weight:700; color:#ff6b6b; background:rgba(255,107,107,.13); border-radius:5px; padding:2px 5px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; display:block; }

    /* Shift chip */
    .shift-chip { display:flex; align-items:center; gap:5px; padding:5px 8px; border-radius:8px; font-weight:700; font-size:.82rem; cursor:pointer; transition:filter .15s,transform .12s,box-shadow .15s; position:relative; }
    .shift-chip:hover { filter:brightness(1.3); transform:scale(1.05); box-shadow:0 4px 14px rgba(0,0,0,.4); }
    .shift-chip.not-mine { opacity:.35; cursor:default; pointer-events:none; }
    .shift-chip .chip-icon { flex-shrink:0; }
    .shift-chip .chip-name { flex:1; text-align:right; }
    .sh-morning   { background:#fdd835; color:#3e2723; }
    .sh-afternoon { background:#f57c00; color:#fff; }
    .sh-night     { background:#0d47a1; color:#fff; }

    /* Step 3: Overlay — pick replacement */
    .pick-overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:center; justify-content:center; z-index:1100; backdrop-filter:blur(7px); opacity:0; pointer-events:none; transition:opacity .2s; }
    .pick-overlay.open { opacity:1; pointer-events:all; }
    .pick-box { background:var(--modal-bg,#1a1530); border:1px solid var(--border); border-radius:20px; padding:26px 28px; width:92%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,.7); transform:translateY(18px) scale(.97); transition:transform .25s ease; }
    .pick-overlay.open .pick-box { transform:translateY(0) scale(1); }
    .pick-icon  { font-size:2rem; text-align:center; margin-bottom:8px; }
    .pick-title { font-size:1rem; font-weight:700; color:var(--hdr-txt); margin-bottom:4px; text-align:center; }
    .pick-sub   { font-size:.82rem; color:var(--day-lbl); margin-bottom:18px; text-align:center; line-height:1.6; }
    .pick-grid  { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .pick-btn { padding:16px 10px; border-radius:12px; border:2px solid transparent; font-family:'Sarabun',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; background:rgba(255,255,255,.06); transition:transform .15s,box-shadow .15s; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .pick-btn:hover { transform:scale(1.06); box-shadow:0 4px 18px rgba(0,0,0,.4); background:rgba(255,255,255,.1); }
    .pick-btn.hidden { display:none; }
    .pick-cancel { width:100%; padding:10px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--day-lbl); font-family:'Sarabun',sans-serif; font-size:.9rem; cursor:pointer; transition:background .2s; }
    .pick-cancel:hover { background:rgba(255,255,255,.12); }

    /* Toast */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--accent); color:#fff; padding:10px 22px; border-radius:30px; font-size:.88rem; font-weight:600; box-shadow:0 4px 20px rgba(0,0,0,.4); transition:transform .3s ease,opacity .3s; opacity:0; z-index:2000; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="app-title">
      <a href="index.html" style="text-decoration:none;margin-right:8px;transform:scale(1.2);display:inline-block;" title="กลับหน้าหลัก">🔙</a>
      🏷️ โอนเวร / ขายเวร
      <span class="badge">เลือกคนแทน</span>
    </div>
    <div class="theme-bar">
      <span style="color:var(--day-lbl);font-size:.8rem;">🎨</span>
      <div class="swatch" data-theme="cosmic" style="background:linear-gradient(135deg,#7c4dff,#0f0c29)"></div>
      <div class="swatch" data-theme="paper"  style="background:linear-gradient(135deg,#795548,#f0ebe1)"></div>
      <div class="swatch" data-theme="coffee" style="background:linear-gradient(135deg,#3d2b1f,#1c140d)"></div>
      <div class="swatch" data-theme="dark"   style="background:linear-gradient(135deg,#1a1a1a,#000)"></div>
      <div class="swatch" data-theme="candy"  style="background:linear-gradient(135deg,#ff4081,#2d0a1c)"></div>
    </div>
  </div>

  <!-- Steps -->
  <div class="steps">
    <div class="step-dot active" id="sdot1">1</div>
    <div class="step-label">ผู้ขาย</div>
    <div class="step-line"></div>
    <div class="step-dot" id="sdot2">2</div>
    <div class="step-label">เลือกวัน/กะ</div>
    <div class="step-line"></div>
    <div class="step-dot" id="sdot3">3</div>
    <div class="step-label">คนรับแทน</div>
  </div>

  <!-- Step 1 -->
  <div id="step1">
    <div class="step1-title">🏷️ ใครต้องการขายเวร?</div>
    <div class="step1-sub">เลือกชื่อของคุณ</div>
    <div class="req-grid" id="sellGrid">
      <!-- สร้างจาก JS -->
    </div>
  </div>

  <!-- Step 2 -->
  <div id="step2">
    <div class="seller-banner">
      ️༻ ผู้ขาย: <strong id="sellerLabel">–</strong>
      <button class="change-btn" onclick="changeSeller()">เปลี่ยน</button>
    </div>
    <p class="hint-txt">� คลิกที่กะเวรของคุณเพื่อเลือกคนมารับแทน</p>
    <div class="calendar">
      <div class="cal-header">
        <div class="cal-title" id="calTitle">– <span>–</span></div>
        <div class="nav-group">
          <button class="today-btn" id="btnToday">วันนี้</button>
          <button class="nav-btn" id="btnPrev">&#8249;</button>
          <button class="nav-btn" id="btnNext">&#8250;</button>
        </div>
      </div>
      <div class="day-labels">
        <div class="day-lbl sun">อา</div><div class="day-lbl">จ</div><div class="day-lbl">อ</div>
        <div class="day-lbl">พ</div><div class="day-lbl">พฤ</div><div class="day-lbl">ศ</div>
        <div class="day-lbl sat">ส</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- รายการโอน/ขายเวรล่าสุด -->
    <div id="transferLog" style="margin-top:18px;display:none;">
      <div style="font-size:.88rem;font-weight:700;color:var(--hdr-txt);margin-bottom:10px;opacity:.8;">📋 รายการขายเวรล่าสุด (คลิกเพื่อยกเลิก)</div>
      <div id="transferLogBody"></div>
    </div>
  </div>

  <!-- Step 3: Pick replacement overlay -->
  <div class="pick-overlay" id="pickOverlay">
    <div class="pick-box">
      <div class="pick-icon">🔁</div>
      <div class="pick-title">เลือกคนรับเวรแทน</div>
      <div class="pick-sub" id="pickSub"></div>
      <div class="pick-grid" id="pickGrid">
        <!-- สร้างจาก JS -->
      </div>
      <button class="pick-cancel" onclick="closePick()">ยกเลิก</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const GS_URL = 'https://script.google.com/macros/s/AKfycbxwkcBPudJEr_FfHrLvaEOrPjzdu3wC9G3HUHOue_cc--zLoPGVcQNDMS8Tgrv1Q3lx/exec';
    const DUTY_KEY = 'dutyMap_v1';

    const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const SHIFTS = [
      { key:'เช้า',  icon:'☀️', slots:2, bg:'sh-morning'   },
      { key:'บ่าย',  icon:'⛅', slots:2, bg:'sh-afternoon' },
      { key:'ดึก',   icon:'🌙', slots:1, bg:'sh-night'     },
    ];

    const TODAY = new Date();
    let current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
    let dutyMap = JSON.parse(localStorage.getItem(DUTY_KEY) || '{}');

    // holidays
    let holidayMap = {};
    try { const _h = localStorage.getItem('holidayMap_v1'); if (_h) holidayMap = JSON.parse(_h).data || {}; } catch {}

    let seller = '';
    let pending = null; // { dk, dateStr, shift, slot }

    // transfer history map
    let sellTransferMap = {};
    try { sellTransferMap = JSON.parse(localStorage.getItem('sellTransferMap_v1') || '{}'); } catch {}
    let sellMap = {};
    try { sellMap = JSON.parse(localStorage.getItem('sellMap_v1') || '{}'); } catch {}

    function fmtDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function dutyKey(date, shift, slot) { return `${date}|${shift}|${slot}`; }

    function showToast(msg, err=false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = err ? '#e53935' : '#e65100';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    const DEFAULT_STAFF = {
      'โจ้': { name: 'โจ้', color: '#a78bfa' },
      'ว่าน': { name: 'ว่าน', color: '#34d399' },
      'ฟลุ๊ค': { name: 'ฟลุ๊ค', color: '#60a5fa' },
      'เอ้': { name: 'เอ้', color: '#fbbf24' }
    };
    let staffMap = JSON.parse(localStorage.getItem('staffMap_v1') || 'null') || DEFAULT_STAFF;

    function renderStaffButtons() {
      const sellGrid = document.getElementById('sellGrid');
      if (sellGrid) {
        sellGrid.innerHTML = '';
        Object.keys(staffMap).forEach(k => {
          const st = staffMap[k];
          const btn = document.createElement('button');
          btn.className = 'req-btn';
          btn.style.color = st.color;
          btn.style.borderColor = st.color;
          btn.innerHTML = `<span class="req-icon">👤</span>${st.name}`;
          btn.onclick = () => selectSeller(st.name);
          sellGrid.appendChild(btn);
        });
      }

      const pickGrid = document.getElementById('pickGrid');
      if (pickGrid) {
        pickGrid.innerHTML = '';
        Object.keys(staffMap).forEach(k => {
          const st = staffMap[k];
          const btn = document.createElement('button');
          btn.className = 'pick-btn';
          // using encodeURI safely
          btn.id = 'pb_' + encodeURIComponent(st.name);
          btn.style.color = st.color;
          btn.style.borderColor = st.color;
          btn.innerHTML = `<span style="font-size:1.5rem;">👤</span>${st.name}`;
          btn.onclick = () => confirmTransfer(st.name);
          pickGrid.appendChild(btn);
        });
      }
    }

    /* ── Step 1 ── */
    function selectSeller(name) {
      seller = name;
      document.getElementById('sdot1').className = 'step-dot done';
      document.getElementById('sdot1').textContent = '✓';
      document.getElementById('sdot2').classList.add('active');
      document.getElementById('sellerLabel').textContent = name;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      buildGrid(current.getFullYear(), current.getMonth());
      renderTransferLog(); // แสดงรายการที่เคยขายไปแล้ว
    }
    function changeSeller() {
      seller = '';
      document.getElementById('sdot1').className = 'step-dot active';
      document.getElementById('sdot1').textContent = '1';
      document.getElementById('sdot2').classList.remove('active');
      document.getElementById('sdot2').textContent = '2';
      document.getElementById('sdot3').classList.remove('active');
      document.getElementById('sdot3').textContent = '3';
      document.getElementById('step1').style.display = 'block';
      document.getElementById('step2').style.display = 'none';
    }

    /* ── Step 2: Calendar ── */
    function buildGrid(year, month) {
      const grid = document.getElementById('calGrid');
      grid.style.animation = 'none'; grid.offsetHeight; grid.style.animation = '';
      grid.innerHTML = '';
      const first = new Date(year, month, 1);
      const total = new Date(year, month+1, 0).getDate();
      const startDow = first.getDay();
      const prevLast = new Date(year, month, 0).getDate();
      for (let i = startDow-1; i >= 0; i--) addCell(prevLast-i, true, new Date(year,month-1,prevLast-i));
      for (let d = 1; d <= total; d++) addCell(d, false, new Date(year,month,d));
      const filled = startDow + total;
      const cols = Math.ceil(filled/7)*7;
      for (let i = 1; i <= cols-filled; i++) addCell(i, true, new Date(year,month+1,i));
      document.getElementById('calTitle').innerHTML = `${THAI_MONTHS[month]} <span>${year+543}</span>`;
    }

    function getCurrentOwner(dk) {
      const transferEntry = sellTransferMap[dk];
      return (transferEntry && transferEntry.buyer) || dutyMap[dk] || '';
    }

    function addCell(dayNum, otherMonth, dateObj) {
      const grid = document.getElementById('calGrid');
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (otherMonth) cell.classList.add('other-month');
      const dow = dateObj.getDay();
      if (dow === 0) cell.classList.add('is-sun');
      if (dow === 6) cell.classList.add('is-sat');
      const isToday = !otherMonth &&
        dateObj.getFullYear()===TODAY.getFullYear() &&
        dateObj.getMonth()===TODAY.getMonth() &&
        dateObj.getDate()===TODAY.getDate();
      if (isToday) cell.classList.add('is-today');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = dayNum;
      cell.appendChild(num);

      const dateStr = fmtDate(dateObj);
      const hn = !otherMonth ? (holidayMap[dateStr]||'') : '';
      if (hn && dow!==0 && dow!==6) cell.classList.add('is-holiday');
      if (hn) {
        const lbl = document.createElement('span');
        lbl.className = 'holiday-label';
        lbl.textContent = '🎌 ' + hn;
        cell.appendChild(lbl);
      }

      const shiftsDiv = document.createElement('div');
      shiftsDiv.className = 'shifts';

      SHIFTS.forEach(({ key, icon, slots, bg }) => {
        const isWeekend = dow===0 || dow===6;
        const isHoliday = !!holidayMap[dateStr];
        if (key==='เช้า' && !isWeekend && !isHoliday) return;
        for (let s = 1; s <= slots; s++) {
          const dk = dutyKey(dateStr, key, s);
          const name = getCurrentOwner(dk);
          if (!name) continue;
          const isMine = name === seller;
          const tEntry = sellTransferMap[dk]; // โอนแล้ว
          const chip = document.createElement('div');
          chip.className = `shift-chip ${bg}${isMine && !otherMonth ? '' : ' not-mine'}`;
          if (tEntry) {
            // แสดง seller (ขีด) → ขาย → buyer
            chip.innerHTML = `
              <span class="chip-icon">${icon}</span>
              <span style="text-decoration:line-through;opacity:.55;font-size:.75rem;">${tEntry.original}</span>
              <span style="font-size:.65rem;background:#e65100;color:#fff;border-radius:4px;padding:0 4px;margin:0 2px;">ขาย</span>
              <span class="chip-name" style="font-size:.78rem;">${name}</span>
            `;
          } else {
            chip.innerHTML = `<span class="chip-icon">${icon}</span><span class="chip-name">${name}</span>`;
          }
          if (isMine && !otherMonth) {
            chip.title = 'คลิกเพื่อเลือกคนมารับแทน';
            chip.addEventListener('click', () => openPick(dk, dateStr, key, s, dateObj));
          }
          shiftsDiv.appendChild(chip);
        }
      });

      cell.appendChild(shiftsDiv);
      grid.appendChild(cell);
    }

    /* ── Step 3: Pick replacement ── */
    function openPick(dk, dateStr, shift, slot, dateObj) {
      pending = { dk, dateStr, shift, slot };
      const shiftDef = SHIFTS.find(s => s.key === shift);
      const slotTxt  = shiftDef && shiftDef.slots > 1 ? ` ช่อง ${slot}` : '';
      const thaiDate = `${dateObj.getDate()} ${THAI_MONTHS[dateObj.getMonth()]} ${dateObj.getFullYear()+543}`;

      document.getElementById('pickSub').innerHTML =
        `<strong style="color:#ffb74d;">${seller}</strong> ขายเวร<br>` +
        `${shiftDef ? shiftDef.icon : ''} <strong>เวร${shift}${slotTxt}</strong> · ${thaiDate}`;

      // ซ่อนปุ่มของ seller
      Object.keys(staffMap).forEach(k => {
        const btn = document.getElementById('pb_' + encodeURIComponent(k));
        if (btn) {
          if (k === seller) btn.classList.add('hidden');
          else btn.classList.remove('hidden');
        }
      });

      // update step indicator
      document.getElementById('sdot2').className = 'step-dot done';
      document.getElementById('sdot2').textContent = '✓';
      document.getElementById('sdot3').classList.add('active');

      document.getElementById('pickOverlay').classList.add('open');
    }

    function closePick() {
      document.getElementById('pickOverlay').classList.remove('open');
      // revert step 3 indicator if cancelled
      document.getElementById('sdot2').className = 'step-dot done';
      document.getElementById('sdot3').className = 'step-dot';
      document.getElementById('sdot3').textContent = '3';
      pending = null;
    }

    function confirmTransfer(buyerName) {
      if (!pending) return;
      document.getElementById('pickOverlay').classList.remove('open');
      const { dk, dateStr, shift, slot } = pending;
      const currentSeller = getCurrentOwner(dk) || seller;

      // อัปเดต dutyMap
      dutyMap[dk] = buyerName;
      localStorage.setItem(DUTY_KEY, JSON.stringify(dutyMap));

      // ลบออกจาก sellMap (ถ้ามี)
      delete sellMap[dk];
      localStorage.setItem('sellMap_v1', JSON.stringify(sellMap));

      // บันทึก transfer record (แสดง ~~seller~~ ขาย buyer)
      sellTransferMap[dk] = { original: currentSeller, buyer: buyerName, date: dateStr, shift, slot, savedAt: new Date().toISOString() };
      localStorage.setItem('sellTransferMap_v1', JSON.stringify(sellTransferMap));

      // ซิงก์ไปยัง Sheets
      const p = { date: dateStr, shift, slot, name: buyerName };
      fetch(GS_URL + '?' + new URLSearchParams(p).toString() + '&t=' + Date.now(), { mode:'no-cors' })
        .catch(e => console.warn(e));
      // บันทึก transfer log ใน sheet
      const pt = { action:'sellTransfer', date:dateStr, shift, slot, seller:currentSeller, buyer:buyerName };
      fetch(GS_URL + '?' + new URLSearchParams(pt).toString() + '&t=' + Date.now(), { mode:'no-cors' })
        .catch(e => console.warn(e));
      // ยกเลิก sell announcement (ถ้ามี)
      const ps = { action:'cancelSell', date:dateStr, shift, slot, name:currentSeller };
      fetch(GS_URL + '?' + new URLSearchParams(ps).toString() + '&t=' + Date.now(), { mode:'no-cors' })
        .catch(e => console.warn(e));

      // update steps
      document.getElementById('sdot3').className = 'step-dot done';
      document.getElementById('sdot3').textContent = '✓';

      buildGrid(current.getFullYear(), current.getMonth());
      renderTransferLog();

      const d = new Date(dateStr);
      const thaiDate = `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;
      showToast(`✅ ${buyerName} รับเวร${shift} ${thaiDate} แทน ${currentSeller}`);
      pending = null;

      // reset for next transfer
      setTimeout(() => {
        document.getElementById('sdot2').className = 'step-dot active';
        document.getElementById('sdot3').className = 'step-dot';
        document.getElementById('sdot3').textContent = '3';
      }, 2000);
    }

    /* ── ยกเลิกการขายเวร ── */
    function cancelTransfer(dk) {
      const entry = sellTransferMap[dk];
      if (!entry) return;
      if (!confirm(`ยืนยันยกเลิกการขายเวร?\n${entry.original} → ${entry.buyer}\nเวร${entry.shift} ${entry.date}`)) return;

      // คืน duty ให้ seller เดิม
      dutyMap[dk] = entry.original;
      localStorage.setItem(DUTY_KEY, JSON.stringify(dutyMap));

      // ลบ transfer record
      delete sellTransferMap[dk];
      localStorage.setItem('sellTransferMap_v1', JSON.stringify(sellTransferMap));

      // ส่งไปยัง Sheets: คืน duty + ลบ sellTransfer
      const p = { date: entry.date, shift: entry.shift, slot: entry.slot, name: entry.original };
      fetch(GS_URL + '?' + new URLSearchParams(p).toString() + '&t=' + Date.now(), { mode:'no-cors' })
        .catch(e => console.warn(e));
      const p2 = { action:'cancelSellTransfer', date:entry.date, shift:entry.shift, slot:entry.slot, seller:entry.original };
      fetch(GS_URL + '?' + new URLSearchParams(p2).toString() + '&t=' + Date.now(), { mode:'no-cors' })
        .catch(e => console.warn(e));

      buildGrid(current.getFullYear(), current.getMonth());
      renderTransferLog();
      showToast(`↩ ยกเลิกแล้ว — คืนเวรให้ ${entry.original}`);
    }

    /* ── แสดงรายการขายเวรล่าสุด ── */
    const SHIFT_ICONS = { 'เช้า':'☀️', 'บ่าย':'⛅', 'ดึก':'🌙' };
    function renderTransferLog() {
      const logEl = document.getElementById('transferLog');
      const body  = document.getElementById('transferLogBody');
      if (!logEl || !body) return;

      // กรอง entries ที่ seller คือคนที่เลือก
      const entries = Object.entries(sellTransferMap).filter(([, e]) => e.original === seller);
      if (!entries.length) { logEl.style.display = 'none'; return; }

      logEl.style.display = 'block';
      body.innerHTML = entries.map(([dk, e]) => {
        const d = new Date(e.date);
        const thaiDate = `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;
        const icon = SHIFT_ICONS[e.shift] || '';
        return `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.05);
            border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:.85rem;">
            <span style="flex:1;color:var(--txt);">
              ${icon} <strong style="color:#ffb74d;">${e.shift}</strong>
              · ${thaiDate}<br>
              <span style="opacity:.6;font-size:.78rem;"><s>${e.original}</s> → <strong style="color:#4db6ac;">${e.buyer}</strong></span>
            </span>
            <button onclick="cancelTransfer('${dk.replace(/'/g,"\\'")}')"
              style="padding:5px 12px;border-radius:8px;border:1px solid #e53935;
              background:rgba(229,57,53,.12);color:#ef9a9a;font-size:.78rem;
              cursor:pointer;font-family:'Sarabun',sans-serif;white-space:nowrap;">✕ ยกเลิก</button>
          </div>`;
      }).join('');
    }

    document.getElementById('pickOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closePick();
    });

    /* ── Nav ── */
    document.getElementById('btnPrev').addEventListener('click', () => { current.setMonth(current.getMonth()-1); buildGrid(current.getFullYear(),current.getMonth()); });
    document.getElementById('btnNext').addEventListener('click', () => { current.setMonth(current.getMonth()+1); buildGrid(current.getFullYear(),current.getMonth()); });
    document.getElementById('btnToday').addEventListener('click', () => { current = new Date(TODAY.getFullYear(),TODAY.getMonth(),1); buildGrid(current.getFullYear(),current.getMonth()); });

    /* ── Init ── */
    renderStaffButtons();

    // Auto Update on Focus via LocalStorage
    window.addEventListener('focus', () => {
      dutyMap = JSON.parse(localStorage.getItem(DUTY_KEY) || '{}');
      sellTransferMap = JSON.parse(localStorage.getItem('sellTransferMap_v1') || '{}');
      sellMap = JSON.parse(localStorage.getItem('sellMap_v1') || '{}');
      staffMap = JSON.parse(localStorage.getItem('staffMap_v1') || 'null') || DEFAULT_STAFF;
      renderStaffButtons();
      if (seller) {
        buildGrid(current.getFullYear(), current.getMonth());
        renderTransferLog();
      }
    });

    /* ── Theme ── */
    const THEME_MAP = { cosmic:'', paper:'t-paper', candy:'t-candy', coffee:'t-coffee', dark:'t-dark' };
    const savedTheme = localStorage.getItem('theme') || '';
    document.body.className = savedTheme;
    document.querySelectorAll('.swatch').forEach(s => {
      if ((THEME_MAP[s.dataset.theme]||'') === savedTheme || (!savedTheme && s.dataset.theme==='cosmic')) s.classList.add('active');
      s.addEventListener('click', () => {
        const c = THEME_MAP[s.dataset.theme] || '';
        document.body.className = c;
        localStorage.setItem('theme', c);
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      });
    });
  </script>
</body>
</html>
