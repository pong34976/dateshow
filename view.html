<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ดูเวรส่วนตัว</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0f0c29;
      --bg2: radial-gradient(ellipse at 20% 0%, #302060 0%, #0f0c29 65%);
      --hdr: rgba(255, 255, 255, 0.05);
      --hdr-txt: #fff;
      --day-lbl: rgba(255, 255, 255, 0.45);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --txt: #ddd;
      --other: .22;
      --nav: rgba(255, 255, 255, 0.12);
      --nav-hov: rgba(255, 255, 255, 0.24);
      --accent: #7c4dff;
      --today-ring: #7c4dff;
      --sun: #ff6b6b;
      --sat: #80b0ff;
      --shadow: 0 8px 40px rgba(0, 0, 0, .55);
      --radius: 18px;
    }

    .t-coffee {
      --bg: #1c140d;
      --bg2: radial-gradient(ellipse at 20% 0%, #3d2b1f, #1c140d 65%);
      --hdr: rgba(215, 204, 200, 0.08);
      --hdr-txt: #efebe9;
      --day-lbl: rgba(188, 170, 164, 0.6);
      --cell: rgba(215, 204, 200, 0.05);
      --cell-hov: rgba(215, 204, 200, 0.1);
      --border: rgba(141, 110, 99, 0.2);
      --txt: #d7ccc8;
      --nav: rgba(141, 110, 99, 0.15);
      --nav-hov: rgba(141, 110, 99, 0.3);
      --accent: #a1887f;
      --today-ring: #ff5722;
      --sun: #ff5252;
      --sat: #64b5f6;
      --modal-bg: #2b1f1a;
    }

    .t-dark {
      --bg: #000000;
      --bg2: radial-gradient(ellipse at 20% 0%, #0a0a0a, #000000 65%);
      --hdr: rgba(0, 255, 255, 0.05);
      --hdr-txt: #ffffff;
      --day-lbl: rgba(255, 255, 255, 0.4);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(0, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.1);
      --txt: #e0e0e0;
      --nav: rgba(255, 255, 255, 0.08);
      --nav-hov: rgba(0, 255, 255, 0.2);
      --accent: #00bcd4;
      --today-ring: #00bcd4;
      --sun: #ff1744;
      --sat: #2979ff;
      --modal-bg: #0a0a0a;
    }

    .t-candy {
      --bg: #2d0a1c;
      --bg2: radial-gradient(ellipse at 20% 0%, #5c1839, #2d0a1c 65%);
      --hdr: rgba(255, 64, 129, 0.18);
      --hdr-txt: #ffffff;
      --day-lbl: #ff80ab;
      --cell: rgba(255, 128, 171, 0.1);
      --cell-hov: rgba(255, 64, 129, 0.22);
      --border: rgba(255, 128, 171, 0.25);
      --txt: #ffe0eb;
      --nav: rgba(255, 64, 129, 0.25);
      --nav-hov: rgba(255, 64, 129, 0.45);
      --accent: #ff4081;
      --today-ring: #ff1744;
      --sun: #ff1744;
      --sat: #f50057;
      --modal-bg: #3d0d25;
    }

    .t-paper {
      --bg: #fdfaf0;
      --bg2: linear-gradient(135deg, #ffffff, #f2ead3);
      --hdr: rgba(93, 64, 55, 0.08);
      --hdr-txt: #3e2723;
      --day-lbl: #5d4037;
      --txt: #261a15;
      --cell: rgba(255, 255, 255, 0.9);
      --cell-hov: rgba(93, 64, 55, 0.1);
      --border: #d7ccc8;
      --nav: rgba(93, 64, 55, 0.12);
      --nav-hov: rgba(93, 64, 55, 0.25);
      --accent: #8d6e63;
      --today-ring: #bf360c;
      --sun: #d32f2f;
      --sat: #1976d2;
      --modal-bg: #ffffff;
      --m-txt: #e65100;
      --m-bg: rgba(230, 81, 0, .15);
      --m-slot: rgba(230, 81, 0, .08);
      --m-border: rgba(230, 81, 0, .2);
      --a-txt: #bf360c;
      --a-bg: rgba(191, 54, 12, .15);
      --a-slot: rgba(191, 54, 12, .08);
      --a-border: rgba(191, 54, 12, .2);
      --n-txt: #0d47a1;
      --n-bg: rgba(13, 71, 161, .15);
      --n-slot: rgba(13, 71, 161, .08);
      --n-border: rgba(13, 71, 161, .2);
    }

    :root {
      --c-joe: #a78bfa;
      --c-wan: #34d399;
      --c-flook: #60a5fa;
      --c-ae: #fbbf24;
      --c-empty: rgba(255, 255, 255, 0.2);
    }

    .t-paper {
      --c-empty: rgba(0, 0, 0, .4)
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg2, var(--bg));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 40px;
      transition: background .4s;
    }

    .topbar {
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--hdr-txt);
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title .badge {
      font-size: .72rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .theme-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .theme-label {
      color: var(--day-lbl);
      font-size: .8rem;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .4);
    }

    .swatch:hover {
      transform: scale(1.2);
    }

    .swatch.active {
      border-color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .25);
    }

    .calendar {
      width: 100%;
      max-width: 1100px;
      background: var(--cell);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .cal-header {
      background: var(--hdr);
      padding: 20px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .cal-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--hdr-txt);
      letter-spacing: .3px;
    }

    .cal-title span {
      color: var(--accent);
    }

    .nav-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-btn {
      background: var(--nav);
      color: var(--hdr-txt);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .nav-btn:hover {
      background: var(--nav-hov);
      transform: scale(1.1);
      box-shadow: 0 0 10px var(--accent);
    }

    .today-btn {
      padding: 7px 16px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Sarabun', sans-serif;
      font-size: .88rem;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .today-btn:hover {
      opacity: .8;
      transform: scale(1.05);
    }

    .day-labels {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      background: var(--hdr);
      border-bottom: 1px solid var(--border);
    }

    .day-lbl {
      text-align: center;
      padding: 10px 0;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--day-lbl);
      text-transform: uppercase;
    }

    .day-lbl.sun { color: var(--sun); }
    .day-lbl.sat { color: var(--sat); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px) }
      to { opacity: 1; transform: translateY(0) }
    }

    .cal-grid {
      animation: fadein .3s ease;
    }

    .cal-cell {
      min-height: 155px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background .2s;
      position: relative;
    }

    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover { background: var(--cell-hov); }
    .cal-cell.other-month { opacity: .3; }

    .cal-cell.is-today::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 2px solid var(--today-ring);
      border-radius: 2px;
      opacity: .5;
    }

    .day-num {
      font-size: .9rem;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--txt);
      transition: background .2s, color .2s;
    }

    .cal-cell.is-today .day-num {
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #000));
      color: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .4);
    }

    .cal-cell.is-sun .day-num { color: var(--sun); }
    .cal-cell.is-sat .day-num { color: var(--sat); }
    .cal-cell.other-month .day-num { color: var(--txt); }

    .shifts {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .shift-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .shift-group-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 5px 1px;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .3px;
      border-radius: 6px 6px 0 0;
      opacity: .75;
    }

    .shift-slot {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 6px;
      border-radius: 0 0 6px 6px;
      border: 1px solid transparent;
      border-top: none;
      font-size: .78rem;
      min-height: 24px;
    }

    .shift-slot:first-of-type { border-radius: 6px; }
    .shift-slot+.shift-slot { border-radius: 0 0 6px 6px; margin-top: 1px; }

    .slot-num { font-size: .6rem; opacity: .5; flex-shrink: 0; width: 10px; }

    .shift-name {
      flex: 1;
      text-align: right;
      font-weight: 700;
      font-size: .78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sg-morning .shift-group-header { background: var(--m-bg, rgba(255, 220, 100, .12)); color: var(--txt); }
    .sg-morning .shift-slot { background: var(--m-slot, rgba(255, 220, 100, .07)); border-color: var(--m-border, rgba(255, 220, 100, .14)); color: var(--txt); }
    .sg-afternoon .shift-group-header { background: var(--a-bg, rgba(255, 140, 60, .12)); color: var(--txt); }
    .sg-afternoon .shift-slot { background: var(--a-slot, rgba(255, 140, 60, .07)); border-color: var(--a-border, rgba(255, 140, 60, .14)); color: var(--txt); }
    .sg-night .shift-group-header { background: var(--n-bg, rgba(100, 140, 255, .12)); color: var(--txt); }
    .sg-night .shift-slot { background: var(--n-slot, rgba(100, 140, 255, .07)); border-color: var(--n-border, rgba(100, 140, 255, .14)); color: var(--txt); }

    /* old name classes removed */
    .name-empty { color: var(--c-empty); }

    .cal-cell.is-sun, .cal-cell.is-holiday { background: rgba(255, 107, 107, 0.05); }
    .cal-cell.is-sat { background: rgba(128, 176, 255, 0.05); }
    .cal-cell.is-sun:hover, .cal-cell.is-holiday:hover { background: rgba(255, 107, 107, 0.1); }
    .cal-cell.is-sat:hover { background: rgba(128, 176, 255, 0.1); }
    .t-paper .cal-cell.is-sun, .t-paper .cal-cell.is-holiday { background: rgba(211, 47, 47, 0.06); }
    .t-paper .cal-cell.is-sat { background: rgba(25, 118, 210, 0.06); }

    /* ── Shift stat bar ── */
    .stat-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform .15s;
    }
    .stat-chip:hover { transform: scale(1.05); }
    .stat-chip .s-num {
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-chip.s-morning  { background: rgba(255,220,60,.13); border-color: rgba(255,220,60,.25); color: #fdd835; }
    .stat-chip.s-afternoon{ background: rgba(255,140,40,.13); border-color: rgba(255,140,40,.25); color: #ffb74d; }
    .stat-chip.s-night    { background: rgba(100,140,255,.13); border-color: rgba(100,140,255,.25); color: #90caf9; }
    .stat-chip.s-total    { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.15); color: var(--hdr-txt); }
    .t-paper .stat-chip.s-morning   { background: rgba(230,81,0,.1);   border-color: rgba(230,81,0,.2);   color: #e65100; }
    .t-paper .stat-chip.s-afternoon { background: rgba(191,54,12,.1);  border-color: rgba(191,54,12,.2);  color: #bf360c; }
    .t-paper .stat-chip.s-night     { background: rgba(13,71,161,.1);  border-color: rgba(13,71,161,.2);  color: #0d47a1; }
    .t-paper .stat-chip.s-total     { background: rgba(0,0,0,.06);     border-color: rgba(0,0,0,.12);     color: #3e2723; }

    /* Holiday label */
    .holiday-label {
      font-size: .65rem;
      font-weight: 700;
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.13);
      border-radius: 5px;
      padding: 2px 5px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      display: block;
    }
    .t-paper .holiday-label { color: #c62828; background: rgba(198,40,40,.08); }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="app-title">
      <a href="index.html" style="text-decoration:none; margin-right:8px; display:inline-block; transform:scale(1.2);"
        title="กลับหน้าหลัก">🔙</a>
      📋 <span id="pageTitle">เวรส่วนตัว</span>
      <span class="badge" id="nameBadge">...</span>
    </div>
    <div class="theme-bar">
      <span class="theme-label">🎨</span>
      <div class="swatch" data-theme="cosmic" style="background:linear-gradient(135deg,#7c4dff,#0f0c29)" title="Cosmic"></div>
      <div class="swatch" data-theme="paper" style="background:linear-gradient(135deg,#795548,#f0ebe1)" title="Paper"></div>
      <div class="swatch" data-theme="coffee" style="background:linear-gradient(135deg,#3d2b1f,#1c140d)" title="Coffee"></div>
      <div class="swatch" data-theme="dark" style="background:linear-gradient(135deg,#1a1a1a,#000000)" title="Dark"></div>
      <div class="swatch" data-theme="candy" style="background:linear-gradient(135deg,#ff4081,#2d0a1c)" title="Candy"></div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar">
    <div class="cal-header">
      <div>
        <div class="cal-title" id="calTitle">มีนาคม <span>2569</span></div>
        <div class="stat-bar" id="statBar">
          <div class="stat-chip s-morning"  id="statMorn">  ☀️ <span class="s-lbl">เช้า</span> <span class="s-num" id="cntMorn">0</span></div>
          <div class="stat-chip s-afternoon" id="statAftn"> ⛅ <span class="s-lbl">บ่าย</span> <span class="s-num" id="cntAftn">0</span></div>
          <div class="stat-chip s-night"    id="statNight">🌙 <span class="s-lbl">ดึก</span>  <span class="s-num" id="cntNight">0</span></div>
          <div class="stat-chip s-total"    id="statTotal">📊 รวม <span class="s-num" id="cntTotal">0</span> เวร</div>
        </div>
      </div>
      <div class="nav-group">
        <button class="nav-btn" id="btnPrev">&#8249;</button>
        <button class="nav-btn" id="btnNext">&#8250;</button>
        <button class="today-btn" id="btnToday">เดือนนี้</button>
        <a href="index.html" class="today-btn"
          style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);">หน้าหลัก</a>
      </div>
    </div>
    <div class="day-labels">
      <div class="day-lbl sun">อา</div>
      <div class="day-lbl">จ</div>
      <div class="day-lbl">อ</div>
      <div class="day-lbl">พ</div>
      <div class="day-lbl">พฤ</div>
      <div class="day-lbl">ศ</div>
      <div class="day-lbl sat">ส</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <script>
    const STORAGE_KEY = 'dutyMap_v1';
    
    const DEFAULT_STAFF = {
      'โจ้': { name: 'โจ้', color: '#a78bfa' },
      'ว่าน': { name: 'ว่าน', color: '#34d399' },
      'ฟลุ๊ค': { name: 'ฟลุ๊ค', color: '#60a5fa' },
      'เอ้': { name: 'เอ้', color: '#fbbf24' }
    };
    let staffMap = JSON.parse(localStorage.getItem('staffMap_v1') || 'null') || DEFAULT_STAFF;

    const params = new URLSearchParams(window.location.search);
    let targetName = params.get('n') || '';
    if (!targetName) {
      const rawUser = params.get('u') || '';
      const aliasMap = { 'joe': 'โจ้', 'wan': 'ว่าน', 'flook': 'ฟลุ๊ค', 'ae': 'เอ้' };
      targetName = aliasMap[rawUser.toLowerCase()] || rawUser || '';
    }

    if (targetName) {
      document.getElementById('pageTitle').textContent = `เวรของ ${targetName}`;
      document.getElementById('nameBadge').textContent = 'เวรส่วนตัว';
      const stObj = staffMap[targetName];
      if (stObj) {
        document.getElementById('nameBadge').style.background = stObj.color;
        document.getElementById('nameBadge').style.color = '#fff';
      }
    } else {
      document.getElementById('pageTitle').textContent = 'ดูเวรส่วนตัว (ไม่ได้ระบุชื่อ)';
    }

    const THAI_MONTHS = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
    const SHIFTS = [
      { key: 'เช้า', display: 'ช', cls: 'morning', icon: '☀️', slots: 2 },
      { key: 'บ่าย', display: 'บ', cls: 'afternoon', icon: '⛅', slots: 2 },
      { key: 'ดึก', display: 'ด', cls: 'night', icon: '🌙', slots: 1 },
    ];

    const TODAY = new Date();
    let current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);

    // โหลดข้อมูลจาก localStorage
    let dutyMap = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    let swapMap = JSON.parse(localStorage.getItem('swapMap_v1') || '{}');
    let sellTransferMap = JSON.parse(localStorage.getItem('sellTransferMap_v1') || '{}');

    // ─── Holiday map ─────────────────────────────────────────────
    const HOLIDAY_FALLBACK = {
      '2025-01-01':'วันขึ้นปีใหม่','2025-02-12':'วันมาฆบูชา',
      '2025-04-06':'วันจักรี','2025-04-13':'วันสงกรานต์','2025-04-14':'วันสงกรานต์','2025-04-15':'วันสงกรานต์',
      '2025-05-01':'วันแรงงานแห่งชาติ','2025-05-04':'วันฉัตรมงคล',
      '2025-05-12':'วันหยุดชดเชยวันวิสาขบูชา','2025-06-03':'วันเฉลิมพระชนมพรรษาสมเด็จพระนางเจ้าฯ',
      '2025-07-28':'วันเฉลิมพระชนมพรรษา รัชกาลที่ 10','2025-07-29':'วันอาสาฬบูชา','2025-07-30':'วันเข้าพรรษา',
      '2025-08-12':'วันเฉลิมพระชนมพรรษา สมเด็จพระบรมราชชนนีพันปีหลวง',
      '2025-10-13':'วันนวมินทรมหาราช','2025-10-23':'วันปิยมหาราช',
      '2025-12-05':'วันพ่อแห่งชาติ','2025-12-10':'วันรัฐธรรมนูญ','2025-12-31':'วันสิ้นปี',
      '2026-01-01':'วันขึ้นปีใหม่','2026-01-02':'วันหยุดราชการเพิ่มเป็นกรณีพิเศษ',
      '2026-03-03':'วันมาฆบูชา',
      '2026-04-06':'วันจักรี','2026-04-13':'วันสงกรานต์','2026-04-14':'วันสงกรานต์','2026-04-15':'วันสงกรานต์',
      '2026-05-01':'วันแรงงานแห่งชาติ','2026-05-04':'วันฉัตรมงคล',
      '2026-06-01':'วันหยุดชดเชยวันวิสาขบูชา','2026-06-03':'วันเฉลิมพระชนมพรรษาสมเด็จพระนางเจ้าฯ',
      '2026-07-28':'วันเฉลิมพระชนมพรรษา รัชกาลที่ 10','2026-07-29':'วันอาสาฬบูชา','2026-07-30':'วันเข้าพรรษา',
      '2026-08-12':'วันเฉลิมพระชนมพรรษา สมเด็จพระบรมราชชนนีพันปีหลวง',
      '2026-10-13':'วันนวมินทรมหาราช','2026-10-23':'วันปิยมหาราช',
      '2026-12-07':'วันหยุดชดเชยวันพ่อแห่งชาติ','2026-12-10':'วันรัฐธรรมนูญ','2026-12-31':'วันสิ้นปี',
    };
    let holidayMap = { ...HOLIDAY_FALLBACK };
    try {
      const _h = localStorage.getItem('holidayMap_v1');
      if (_h) { const { data } = JSON.parse(_h); holidayMap = { ...HOLIDAY_FALLBACK, ...(data || {}) }; }
    } catch {}

    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function dutyKey(date, shift, slot) { return `${date}|${shift}|${slot}`; }

    // ─── Build Calendar Grid ─────────────────────────────
    function buildGrid(year, month) {
      const grid = document.getElementById('calGrid');
      grid.style.animation = 'none';
      grid.offsetHeight;
      grid.style.animation = '';
      grid.innerHTML = '';

      const first = new Date(year, month, 1);
      const totalDays = new Date(year, month + 1, 0).getDate();
      const startDow = first.getDay();
      const prevLast = new Date(year, month, 0).getDate();

      for (let i = startDow - 1; i >= 0; i--) {
        addCell(prevLast - i, true, new Date(year, month - 1, prevLast - i));
      }
      for (let d = 1; d <= totalDays; d++) {
        addCell(d, false, new Date(year, month, d));
      }
      const filled = startDow + totalDays;
      const total = Math.ceil(filled / 7) * 7;
      for (let i = 1; i <= total - filled; i++) {
        addCell(i, true, new Date(year, month + 1, i));
      }

      document.getElementById('calTitle').innerHTML =
        `${THAI_MONTHS[month]} <span>${year + 543}</span>`;

      renderStats(year, month);
    }

    function addCell(dayNum, otherMonth, dateObj) {
      const grid = document.getElementById('calGrid');
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (otherMonth) cell.classList.add('other-month');

      const dow = dateObj.getDay();
      if (dow === 0) cell.classList.add('is-sun');
      if (dow === 6) cell.classList.add('is-sat');

      const isToday = !otherMonth &&
        dateObj.getFullYear() === TODAY.getFullYear() &&
        dateObj.getMonth() === TODAY.getMonth() &&
        dateObj.getDate() === TODAY.getDate();
      if (isToday) cell.classList.add('is-today');

      const dateStr = fmtDate(dateObj);
      const holidayName = !otherMonth ? (holidayMap[dateStr] || '') : '';
      if (holidayName && dow !== 0 && dow !== 6) cell.classList.add('is-holiday');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = dayNum;
      cell.appendChild(num);

      if (holidayName) {
        const lbl = document.createElement('span');
        lbl.className = 'holiday-label';
        lbl.title = holidayName;
        lbl.textContent = '🎌 ' + holidayName;
        cell.appendChild(lbl);
      }

      const shiftsDiv = document.createElement('div');
      shiftsDiv.className = 'shifts';

      // 🛑 ONLY SHOW SHIFTS FOR THE TARGET USER 🛑
      if (targetName) {
        SHIFTS.forEach(({ key, display, cls, icon, slots }) => {
          const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
          const isHoliday = !!holidayMap[dateStr];
          if (key === 'เช้า' && !isWeekend && !isHoliday) return;

          let hasDuty = false;
          let html = '';

          for (let s = 1; s <= slots; s++) {
            const dk = dutyKey(dateStr, key, s);
            const originalName = dutyMap[dk] || '';
            const swapEntry = swapMap[dk];
            const transferEntry = sellTransferMap[dk];
            
            // Effective owner: if transferred, buyer owns it. if swapped, requester owns it. if not, originalName owns it.
            let effectiveOwner = originalName;
            if (transferEntry) effectiveOwner = transferEntry.buyer;
            else if (swapEntry) effectiveOwner = swapEntry.requester;

            if (effectiveOwner === targetName) {
              hasDuty = true;
              
              if (transferEntry) {
                // This shift was received via sell transfer
                html += `
                  <div class="shift-slot big-shift-slot" style="cursor:default; height:100%; min-height:55px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius: 8px; margin-top: 5px; position:relative;">
                    <span style="position:absolute; top:2px; right:4px; font-size:0.55rem; background:#e65100; color:#fff; padding:1px 4px; border-radius:4px; font-weight:700;">ซื้อเวรมา</span>
                    <span style="font-size:1.6rem; font-weight:800;">${icon} ${display}</span>
                  </div>
                `;
              } else if (swapEntry) {
                // This shift was received via swap
                html += `
                  <div class="shift-slot big-shift-slot" style="cursor:default; height:100%; min-height:55px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius: 8px; margin-top: 5px; position:relative;">
                    <span style="position:absolute; top:2px; right:4px; font-size:0.55rem; background:#00897b; color:#fff; padding:1px 4px; border-radius:4px; font-weight:700;">แลกเวร</span>
                    <span style="font-size:1.6rem; font-weight:800;">${icon} ${display}</span>
                  </div>
                `;
              } else {
                // Normal duty
                html += `
                  <div class="shift-slot big-shift-slot" style="cursor:default; height:100%; min-height:55px; display:flex; align-items:center; justify-content:center; border-radius: 8px; margin-top: 5px;">
                    <span style="font-size:1.6rem; font-weight:800;">${icon} ${display}</span>
                  </div>
                `;
              }
            }
          }

          if (hasDuty) {
            const group = document.createElement('div');
            group.className = `shift-group sg-${cls}`;

            group.insertAdjacentHTML('beforeend', html);
            shiftsDiv.appendChild(group);
          }
        });
      }

      cell.appendChild(shiftsDiv);
      grid.appendChild(cell);
    }

    // ─── Stat counter ──────────────────────────
    function renderStats(year, month) {
      if (!targetName) return;
      const pfx = `${year}-${String(month + 1).padStart(2, '0')}-`;
      let morn = 0, aftn = 0, night = 0;
      Object.entries(dutyMap).forEach(([dk, name]) => {
        if (!dk.startsWith(pfx)) return;
        const parts = dk.split('|');
        const shift = parts[1] || '';
        // คำนึงถึง swap และ transfer ด้วย
        const swapEntry = swapMap[dk];
        const transferEntry = sellTransferMap[dk];
        let effectiveName = name;
        if (transferEntry) effectiveName = transferEntry.buyer;
        else if (swapEntry) effectiveName = swapEntry.requester;
        
        if (effectiveName !== targetName) return;
        if (shift === 'เช้า') morn++;
        else if (shift === 'บ่าย') aftn++;
        else if (shift === 'ดึก') night++;
      });
      const total = morn + aftn + night;
      document.getElementById('cntMorn').textContent  = morn;
      document.getElementById('cntAftn').textContent  = aftn;
      document.getElementById('cntNight').textContent = night;
      document.getElementById('cntTotal').textContent = total;
      // ไฮไลต์ chip ที่ไม่มีเวร
      document.getElementById('statMorn').style.opacity  = morn  ? '1' : '0.35';
      document.getElementById('statAftn').style.opacity  = aftn  ? '1' : '0.35';
      document.getElementById('statNight').style.opacity = night ? '1' : '0.35';
    }

    // ─── Nav buttons ─────────────────────────────────────
    document.getElementById('btnPrev').addEventListener('click', () => {
      current.setMonth(current.getMonth() - 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      current.setMonth(current.getMonth() + 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });
    document.getElementById('btnToday').addEventListener('click', () => {
      current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });

    // ─── Theme switcher (localStorage) ───────────────────────────────────
    const THEME_MAP = { cosmic: '', paper: 't-paper', candy: 't-candy', coffee: 't-coffee', dark: 't-dark' };
    const savedTheme = localStorage.getItem('theme') || '';
    document.body.className = savedTheme;

    document.querySelectorAll('.swatch').forEach(s => {
      const bodyClass = THEME_MAP[s.dataset.theme] || '';
      if (bodyClass === savedTheme || (!savedTheme && s.dataset.theme === 'cosmic')) {
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      }
      s.addEventListener('click', () => {
        const cls = THEME_MAP[s.dataset.theme] || '';
        document.body.className = cls;
        localStorage.setItem('theme', cls);
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      });
    });

    // ─── Init ─────────────────────────────────────────────
    if (targetName) {
      buildGrid(current.getFullYear(), current.getMonth());
    }

    // Auto Update on Focus via LocalStorage (รองรับ Mobile ด้วย)
    function reloadData() {
      dutyMap = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      swapMap = JSON.parse(localStorage.getItem('swapMap_v1') || '{}');
      sellTransferMap = JSON.parse(localStorage.getItem('sellTransferMap_v1') || '{}');
      staffMap = JSON.parse(localStorage.getItem('staffMap_v1') || 'null') || DEFAULT_STAFF;
      if (targetName) {
        buildGrid(current.getFullYear(), current.getMonth());
      }
    }

    window.addEventListener('focus', reloadData);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') reloadData();
    });
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) reloadData();
    });
  </script>
</body>
