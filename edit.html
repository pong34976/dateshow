<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>จัดการเวร (Edit)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0f0c29;
      --bg2: radial-gradient(ellipse at 20% 0%, #302060 0%, #0f0c29 65%);
      --hdr: rgba(255, 255, 255, 0.05);
      --hdr-txt: #fff;
      --day-lbl: rgba(255, 255, 255, 0.45);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --txt: #ddd;
      --other: .22;
      --nav: rgba(255, 255, 255, 0.12);
      --nav-hov: rgba(255, 255, 255, 0.24);
      --accent: #7c4dff;
      --today-ring: #7c4dff;
      --sun: #ff6b6b;
      --sat: #80b0ff;
      --shadow: 0 8px 40px rgba(0, 0, 0, .55);
      --radius: 18px;
      --modal-bg: #1a1530;
      --modal-shadow: 0 20px 60px rgba(0, 0, 0, .7);
    }

    .t-coffee {
      --bg: #1c140d;
      --bg2: radial-gradient(ellipse at 20% 0%, #3d2b1f, #1c140d 65%);
      --hdr: rgba(215, 204, 200, 0.08);
      --hdr-txt: #efebe9;
      --day-lbl: rgba(188, 170, 164, 0.6);
      --cell: rgba(215, 204, 200, 0.05);
      --cell-hov: rgba(215, 204, 200, 0.1);
      --border: rgba(141, 110, 99, 0.2);
      --txt: #d7ccc8;
      --nav: rgba(141, 110, 99, 0.15);
      --nav-hov: rgba(141, 110, 99, 0.3);
      --accent: #a1887f;
      --today-ring: #ff5722;
      --sun: #ff5252;
      --sat: #64b5f6;
      --modal-bg: #2b1f1a;
    }

    .t-dark {
      --bg: #000000;
      --bg2: radial-gradient(ellipse at 20% 0%, #0a0a0a, #000000 65%);
      --hdr: rgba(0, 255, 255, 0.05);
      --hdr-txt: #ffffff;
      --day-lbl: rgba(255, 255, 255, 0.4);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(0, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.1);
      --txt: #e0e0e0;
      --nav: rgba(255, 255, 255, 0.08);
      --nav-hov: rgba(0, 255, 255, 0.2);
      --accent: #00bcd4;
      --today-ring: #00bcd4;
      --sun: #ff1744;
      --sat: #2979ff;
      --modal-bg: #0a0a0a;
    }

    .t-candy {
      --bg: #2d0a1c;
      --bg2: radial-gradient(ellipse at 20% 0%, #5c1839, #2d0a1c 65%);
      --hdr: rgba(255, 64, 129, 0.18);
      --hdr-txt: #ffffff;
      --day-lbl: #ff80ab;
      --cell: rgba(255, 128, 171, 0.1);
      --cell-hov: rgba(255, 64, 129, 0.22);
      --border: rgba(255, 128, 171, 0.25);
      --txt: #ffe0eb;
      --nav: rgba(255, 64, 129, 0.25);
      --nav-hov: rgba(255, 64, 129, 0.45);
      --accent: #ff4081;
      --today-ring: #ff1744;
      --sun: #ff1744;
      --sat: #f50057;
      --modal-bg: #3d0d25;
    }

    .t-paper {
      --bg: #f8f4e6;
      --bg2: linear-gradient(135deg, #fdfbf7, #e0d8c3);
      --hdr: rgba(120, 80, 40, .12);
      --hdr-txt: #2a1a08;
      --day-lbl: rgba(120, 80, 40, .7);
      --cell: rgba(255, 255, 255, .7);
      --cell-hov: rgba(120, 80, 40, .08);
      --border: rgba(120, 80, 40, .2);
      --txt: #1a1005;
      --nav: rgba(120, 80, 40, .15);
      --nav-hov: rgba(120, 80, 40, .3);
      --accent: #5d4037;
      --today-ring: #5d4037;
      --sun: #b71c1c;
      --sat: #0d47a1;
      --modal-bg: #f0eadd;
      --m-txt: #e65100;
      --m-bg: rgba(230, 81, 0, .15);
      --m-slot: rgba(230, 81, 0, .08);
      --m-border: rgba(230, 81, 0, .2);
      --a-txt: #bf360c;
      --a-bg: rgba(191, 54, 12, .15);
      --a-slot: rgba(191, 54, 12, .08);
      --a-border: rgba(191, 54, 12, .2);
      --n-txt: #0d47a1;
      --n-bg: rgba(13, 71, 161, .15);
      --n-slot: rgba(13, 71, 161, .08);
      --n-border: rgba(13, 71, 161, .2);
    }

    :root {
      --c-joe: #a78bfa;
      --c-wan: #34d399;
      --c-flook: #60a5fa;
      --c-ae: #fbbf24;
      --c-empty: rgba(255, 255, 255, 0.2);
    }

    .t-paper { --c-empty: rgba(0, 0, 0, .4) }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg2, var(--bg));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 40px;
      transition: background .4s;
    }

    .topbar {
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--hdr-txt);
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title .badge {
      font-size: .72rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .theme-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .theme-label { color: var(--day-lbl); font-size: .8rem; }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .4);
    }

    .swatch:hover { transform: scale(1.2); }

    .swatch.active {
      border-color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .25);
    }

    .legend { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .leg-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .8rem;
      color: var(--hdr-txt);
      opacity: .85;
      text-decoration: none;
      cursor: pointer;
    }
    .leg-chip:hover { opacity: 1; transform: scale(1.05); }

    .leg-dot { width: 11px; height: 11px; border-radius: 50%; }

    .calendar {
      width: 100%;
      max-width: 1100px;
      background: var(--cell);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .cal-header {
      background: var(--hdr);
      padding: 20px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .cal-title { font-size: 1.55rem; font-weight: 700; color: var(--hdr-txt); letter-spacing: .3px; }
    .cal-title span { color: var(--accent); }

    .nav-group { display: flex; gap: 8px; align-items: center; }

    .nav-btn {
      background: var(--nav);
      color: var(--hdr-txt);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .nav-btn:hover { background: var(--nav-hov); transform: scale(1.1); box-shadow: 0 0 10px var(--accent); }

    .today-btn {
      padding: 7px 16px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Sarabun', sans-serif;
      font-size: .88rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .today-btn:hover { opacity: .8; transform: scale(1.05); }

    .day-labels {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--hdr);
      border-bottom: 1px solid var(--border);
    }

    .day-lbl {
      text-align: center;
      padding: 10px 0;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--day-lbl);
      text-transform: uppercase;
    }

    .day-lbl.sun { color: var(--sun); }
    .day-lbl.sat { color: var(--sat); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px) }
      to { opacity: 1; transform: translateY(0) }
    }

    .cal-grid { animation: fadein .3s ease; }

    .cal-cell {
      min-height: 155px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background .2s;
      position: relative;
    }

    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover { background: var(--cell-hov); }
    .cal-cell.other-month { opacity: .3; }

    .cal-cell.is-today::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 2px solid var(--today-ring);
      border-radius: 2px;
      opacity: .5;
    }

    .day-num {
      font-size: .9rem;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--txt);
      transition: background .2s, color .2s;
    }

    .cal-cell.is-today .day-num {
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #000));
      color: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .4);
    }

    .cal-cell.is-sun .day-num { color: var(--sun); }
    .cal-cell.is-sat .day-num { color: var(--sat); }
    .cal-cell.other-month .day-num { color: var(--txt); }

    .shifts { display: flex; flex-direction: column; gap: 3px; flex: 1; }

    .shift-group { display: flex; flex-direction: column; gap: 2px; }

    .shift-group-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 5px 1px;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .3px;
      border-radius: 6px 6px 0 0;
      opacity: .75;
    }

    .shift-slot {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 6px;
      border-radius: 0 0 6px 6px;
      cursor: pointer;
      border: 1px solid transparent;
      border-top: none;
      transition: filter .15s, transform .1s;
      font-size: .78rem;
      min-height: 24px;
    }

    .shift-slot:first-of-type { border-radius: 6px; }
    .shift-slot + .shift-slot { border-radius: 0 0 6px 6px; margin-top: 1px; }
    .shift-slot:hover { filter: brightness(1.3); transform: scale(1.03); }

    .slot-num { font-size: .6rem; opacity: .5; flex-shrink: 0; width: 10px; }

    .shift-name {
      flex: 1;
      text-align: right;
      font-weight: 700;
      font-size: .78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sg-morning .shift-group-header { background: var(--m-bg, rgba(255, 220, 100, .12)); color: var(--txt); }
    .sg-morning .shift-slot { background: var(--m-slot, rgba(255, 220, 100, .07)); border-color: var(--m-border, rgba(255, 220, 100, .14)); color: var(--txt); }
    .sg-afternoon .shift-group-header { background: var(--a-bg, rgba(255, 140, 60, .12)); color: var(--txt); }
    .sg-afternoon .shift-slot { background: var(--a-slot, rgba(255, 140, 60, .07)); border-color: var(--a-border, rgba(255, 140, 60, .14)); color: var(--txt); }
    .sg-night .shift-group-header { background: var(--n-bg, rgba(100, 140, 255, .12)); color: var(--txt); }
    .sg-night .shift-slot { background: var(--n-slot, rgba(100, 140, 255, .07)); border-color: var(--n-border, rgba(100, 140, 255, .14)); color: var(--txt); }

    .name-joe { color: var(--c-joe); }
    .name-wan { color: var(--c-wan); }
    .name-flook { color: var(--c-flook); }
    .name-ae { color: var(--c-ae); }
    .name-empty { color: var(--c-empty); }

    .loading-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      z-index: 9999;
      animation: loading-anim 1.2s linear infinite;
    }

    @keyframes loading-anim {
      0% { transform: translateX(-100%) }
      100% { transform: translateX(100%) }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--modal-bg, #1a1530);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      min-width: 280px;
      max-width: 340px;
      width: 90%;
      box-shadow: var(--modal-shadow);
      transform: translateY(20px) scale(.97);
      transition: transform .25s ease;
    }

    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-title { font-size: 1rem; font-weight: 700; color: var(--hdr-txt); margin-bottom: 6px; }
    .modal-sub { font-size: .82rem; color: var(--day-lbl); margin-bottom: 20px; }

    .staff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }

    .staff-btn {
      padding: 12px 8px;
      border-radius: 12px;
      border: 2px solid transparent;
      font-family: 'Sarabun', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      background: rgba(255, 255, 255, .06);
    }

    .staff-btn:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(0, 0, 0, .4); }
    .staff-btn.joe { color: var(--c-joe); border-color: var(--c-joe); }
    .staff-btn.wan { color: var(--c-wan); border-color: var(--c-wan); }
    .staff-btn.flook { color: var(--c-flook); border-color: var(--c-flook); }
    .staff-btn.ae { color: var(--c-ae); border-color: var(--c-ae); }
    .staff-btn.clear { color: var(--day-lbl); border-color: var(--border); grid-column: 1/-1; font-size: .85rem; }

    .modal-close {
      width: 100%;
      padding: 9px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--border);
      color: var(--day-lbl);
      font-family: 'Sarabun', sans-serif;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s;
    }

    .modal-close:hover { background: rgba(255, 255, 255, .12); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: .88rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .4);
      transition: transform .3s ease, opacity .3s;
      opacity: 0;
      z-index: 2000;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .cal-cell.is-sun, .cal-cell.is-holiday { background: rgba(255, 107, 107, 0.05); }
    .cal-cell.is-sat { background: rgba(128, 176, 255, 0.05); }
    .cal-cell.is-sun:hover, .cal-cell.is-holiday:hover { background: rgba(255, 107, 107, 0.1); }
    .cal-cell.is-sat:hover { background: rgba(128, 176, 255, 0.1); }
    .t-paper .cal-cell.is-sun, .t-paper .cal-cell.is-holiday { background: rgba(211, 47, 47, 0.06); }
    .t-paper .cal-cell.is-sat { background: rgba(25, 118, 210, 0.06); }

    .holiday-label {
      font-size: .65rem;
      font-weight: 700;
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.13);
      border-radius: 5px;
      padding: 2px 5px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      display: block;
    }
    .t-paper .holiday-label { color: #c62828; background: rgba(198, 40, 40, 0.08); }
  </style>
</head>

<body>

  <div class="loading-bar" id="loadingBar" style="display:none"></div>

  <div class="topbar">
    <div class="app-title">
      <a href="index.html" style="text-decoration:none; margin-right:8px; display:inline-block; transform:scale(1.2);"
        title="กลับหน้าหลัก">🔙</a>
      📋 จัดการเวร
      <span class="badge">แก้ไข</span>
    </div>
    <div class="legend">
      <a href="view.html?u=joe" class="leg-chip" title="ดูเวร โจ้"><div class="leg-dot" style="background:var(--c-joe)"></div>โจ้</a>
      <a href="view.html?u=wan" class="leg-chip" title="ดูเวร ว่าน"><div class="leg-dot" style="background:var(--c-wan)"></div>ว่าน</a>
      <a href="view.html?u=flook" class="leg-chip" title="ดูเวร ฟลุ๊ค"><div class="leg-dot" style="background:var(--c-flook)"></div>ฟลุ๊ค</a>
      <a href="view.html?u=ae" class="leg-chip" title="ดูเวร เอ้"><div class="leg-dot" style="background:var(--c-ae)"></div>เอ้</a>
    </div>
    <div class="theme-bar">
      <span class="theme-label">🎨</span>
      <div class="swatch" data-theme="cosmic" style="background:linear-gradient(135deg,#7c4dff,#0f0c29)" title="Cosmic"></div>
      <div class="swatch" data-theme="paper" style="background:linear-gradient(135deg,#795548,#f0ebe1)" title="Paper"></div>
      <div class="swatch" data-theme="coffee" style="background:linear-gradient(135deg,#3d2b1f,#1c140d)" title="Coffee"></div>
      <div class="swatch" data-theme="dark" style="background:linear-gradient(135deg,#1a1a1a,#000000)" title="Dark"></div>
      <div class="swatch" data-theme="candy" style="background:linear-gradient(135deg,#ff4081,#2d0a1c)" title="Candy"></div>
    </div>
  </div>

  <div class="calendar">
    <div class="cal-header">
      <div class="cal-title" id="calTitle">มีนาคม <span>2569</span></div>
      <div class="nav-group">
        <button class="today-btn" id="btnToday">วันนี้</button>
        <button class="nav-btn" id="btnPrev">&#8249;</button>
        <button class="nav-btn" id="btnNext">&#8250;</button>
      </div>
    </div>
    <div class="day-labels">
      <div class="day-lbl sun">อา</div>
      <div class="day-lbl">จ</div>
      <div class="day-lbl">อ</div>
      <div class="day-lbl">พ</div>
      <div class="day-lbl">พฤ</div>
      <div class="day-lbl">ศ</div>
      <div class="day-lbl sat">ส</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">เลือกผู้รับเวร</div>
      <div class="modal-sub" id="modalSub"></div>
      <div class="staff-grid">
        <button class="staff-btn joe" onclick="assign('โจ้')">👤 โจ้</button>
        <button class="staff-btn wan" onclick="assign('ว่าน')">👤 ว่าน</button>
        <button class="staff-btn flook" onclick="assign('ฟลุ๊ค')">👤 ฟลุ๊ค</button>
        <button class="staff-btn ae" onclick="assign('เอ้')">👤 เอ้</button>
        <button class="staff-btn clear" onclick="assign('')">🗑 ล้างออก</button>
      </div>
      <button class="modal-close" onclick="closeModal()">ยกเลิก</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // =====================================================
    //  ⚙️  CONFIG – Google Sheets API
    // =====================================================
    const GS_URL = "https://script.google.com/macros/s/AKfycbxwkcBPudJEr_FfHrLvaEOrPjzdu3wC9G3HUHOue_cc--zLoPGVcQNDMS8Tgrv1Q3lx/exec";
    const STORAGE_KEY = 'dutyMap_v1';
    // =====================================================

    const THAI_MONTHS = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
    const SHIFTS = [
      { key: 'เช้า', cls: 'morning', icon: '🌅', slots: 2 },
      { key: 'บ่าย', cls: 'afternoon', icon: '☀️', slots: 2 },
      { key: 'ดึก', cls: 'night', icon: '🌙', slots: 1 },
    ];
    const STAFF_CLASS = { 'โจ้': 'joe', 'ว่าน': 'wan', 'ฟลุ๊ค': 'flook', 'เอ้': 'ae' };

    const TODAY = new Date();
    let current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);

    // โหลดจาก localStorage หรือเริ่มว่าง
    let dutyMap = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

    // โหลดวันหยุดจาก localStorage (sync มาจาก sheet วันหยุด)
    const _hlCache = localStorage.getItem('holidayMap_v1');
    let holidayMap = {};
    if (_hlCache) { try { holidayMap = JSON.parse(_hlCache).data || {}; } catch {} }

    // Modal state
    let modalDate = '', modalShift = '', modalSlot = 1;

    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function dutyKey(date, shift, slot) { return `${date}|${shift}|${slot}`; }

    function setLoading(on) {
      document.getElementById('loadingBar').style.display = on ? 'block' : 'none';
    }
    function showToast(msg, isErr = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isErr ? '#e53935' : 'var(--accent)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // บันทึกลง localStorage
    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dutyMap));
    }

    // บันทึกลง Google Sheets (แบบ GET)
    function saveToSheets(date, shift, slot, name) {
      const params = new URLSearchParams({ date, shift, slot, name });
      fetch(GS_URL + '?' + params.toString() + '&t=' + Date.now(), { mode: 'no-cors' })
        .catch(err => console.warn('Sheets sync failed:', err));
    }

    // ─── Build Calendar Grid ─────────────────────────────────────────────
    function buildGrid(year, month) {
      const grid = document.getElementById('calGrid');
      grid.style.animation = 'none';
      grid.offsetHeight;
      grid.style.animation = '';
      grid.innerHTML = '';

      const first = new Date(year, month, 1);
      const totalDays = new Date(year, month + 1, 0).getDate();
      const startDow = first.getDay();
      const prevLast = new Date(year, month, 0).getDate();

      for (let i = startDow - 1; i >= 0; i--) {
        addCell(prevLast - i, true, new Date(year, month - 1, prevLast - i));
      }
      for (let d = 1; d <= totalDays; d++) {
        addCell(d, false, new Date(year, month, d));
      }
      const filled = startDow + totalDays;
      const total = Math.ceil(filled / 7) * 7;
      for (let i = 1; i <= total - filled; i++) {
        addCell(i, true, new Date(year, month + 1, i));
      }

      document.getElementById('calTitle').innerHTML =
        `${THAI_MONTHS[month]} <span>${year + 543}</span>`;
    }

    function addCell(dayNum, otherMonth, dateObj) {
      const grid = document.getElementById('calGrid');
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (otherMonth) cell.classList.add('other-month');

      const dow = dateObj.getDay();
      if (dow === 0) cell.classList.add('is-sun');
      if (dow === 6) cell.classList.add('is-sat');

      const isToday = !otherMonth &&
        dateObj.getFullYear() === TODAY.getFullYear() &&
        dateObj.getMonth() === TODAY.getMonth() &&
        dateObj.getDate() === TODAY.getDate();
      if (isToday) cell.classList.add('is-today');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = dayNum;
      cell.appendChild(num);

      const dateStr = fmtDate(dateObj);
      const holidayName = !otherMonth ? (holidayMap[dateStr] || '') : '';

      // is-holiday class (วันธรรมดาที่เป็นวันหยุด)
      if (holidayName && dow !== 0 && dow !== 6) cell.classList.add('is-holiday');

      // แสดงชื่อวันหยุด
      if (holidayName) {
        const lbl = document.createElement('span');
        lbl.className = 'holiday-label';
        lbl.title = holidayName;
        lbl.textContent = '🎌 ' + holidayName;
        cell.appendChild(lbl);
      }

      const shiftsDiv = document.createElement('div');
      shiftsDiv.className = 'shifts';

      SHIFTS.forEach(({ key, cls, icon, slots }) => {
        const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
        const isHoliday = !!holidayMap[dateStr];
        if (key === 'เช้า' && !isWeekend && !isHoliday) return;

        const group = document.createElement('div');
        group.className = `shift-group sg-${cls}`;

        const hdr = document.createElement('div');
        hdr.className = 'shift-group-header';
        hdr.innerHTML = `<span>${icon}</span><span>${key}</span>`;
        group.appendChild(hdr);

        for (let s = 1; s <= slots; s++) {
          const name = dutyMap[dutyKey(dateStr, key, s)] || '';
          const staffCls = name ? (STAFF_CLASS[name] || '') : 'empty';
          const slot = document.createElement('div');
          slot.className = 'shift-slot';
          slot.setAttribute('role', 'button');
          slot.setAttribute('tabindex', otherMonth ? '-1' : '0');
          slot.innerHTML = `
            <span class="slot-num">${slots > 1 ? s : ''}</span>
            <span class="shift-name name-${staffCls}">${name || '–'}</span>
          `;
          if (!otherMonth) {
            const _s = s;
            slot.addEventListener('click', () => openModal(dateStr, key, _s, dateObj));
          } else {
            slot.style.cursor = 'default';
          }
          group.appendChild(slot);
        }

        shiftsDiv.appendChild(group);
      });

      cell.appendChild(shiftsDiv);
      grid.appendChild(cell);
    }

    // ─── Modal ────────────────────────────────────────────
    function openModal(date, shift, slot, dateObj) {
      modalDate = date;
      modalShift = shift;
      modalSlot = slot;
      const shiftDef = SHIFTS.find(s => s.key === shift);
      const thaiDate = `${dateObj.getDate()} ${THAI_MONTHS[dateObj.getMonth()]} ${dateObj.getFullYear() + 543}`;
      const slotTxt = shiftDef.slots > 1 ? ` (ช่อง ${slot})` : '';
      document.getElementById('modalTitle').textContent = `${shiftDef.icon} เวร${shift}${slotTxt}`;
      document.getElementById('modalSub').textContent = thaiDate;
      document.getElementById('modalOverlay').classList.add('open');
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function assign(name) {
      closeModal();
      const key = dutyKey(modalDate, modalShift, modalSlot);
      if (name === '') {
        delete dutyMap[key];
      } else {
        dutyMap[key] = name;
      }
      saveLocal();
      saveToSheets(modalDate, modalShift, modalSlot, name);
      buildGrid(current.getFullYear(), current.getMonth());
      showToast(name ? `✅ บันทึก ${name} – ${modalShift}` : `🗑 ลบเวร ${modalShift}`);
    }

    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      current.setMonth(current.getMonth() - 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      current.setMonth(current.getMonth() + 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });
    document.getElementById('btnToday').addEventListener('click', () => {
      current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });

    // ─── Theme switcher (localStorage) ───────────────────────────────────
    const THEME_MAP = { cosmic: '', paper: 't-paper', candy: 't-candy', coffee: 't-coffee', dark: 't-dark' };
    const savedTheme = localStorage.getItem('theme') || '';
    document.body.className = savedTheme;

    document.querySelectorAll('.swatch').forEach(s => {
      const bodyClass = THEME_MAP[s.dataset.theme] || '';
      if (bodyClass === savedTheme || (!savedTheme && s.dataset.theme === 'cosmic')) {
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      }
      s.addEventListener('click', () => {
        const cls = THEME_MAP[s.dataset.theme] || '';
        document.body.className = cls;
        localStorage.setItem('theme', cls);
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      });
    });

    // ─── Init ─────────────────────────────────────────────
    buildGrid(current.getFullYear(), current.getMonth());
  </script>
</body>

</html>
