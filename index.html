<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Sheets </title>
</head>

<body>
  <h2>Google Sheets v1.3</h2>
  <input type="date" id="date">
  <select id="shift">
    <option value="เช้า">เช้า</option>
    <option value="บ่าย">บ่าย</option>
    <option value="ดึก">ดึก</option>
  </select>
  <input type="text" id="name" placeholder="ชื่อของคุณ">
  <button onclick="sendData()">บันทึกลง Google Sheets</button>

  <script>
    function sendData() {
      const url = "https://script.google.com/macros/s/AKfycbzT8aLoF7xsqrPJUMSRgWoj0KQ3CGtr6q3gLp3a5Nk/exec";
      const payload = {
        date: document.getElementById('date').value,
        shift: document.getElementById('shift').value,
        name: document.getElementById('name').value
      };

      fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        cache: 'no-cache',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload)
      })
        .then(() => {
          alert("ส่งข้อมูลเรียบร้อยแล้ว (ตรวจสอบใน Sheets)");
        })
        .catch(error => console.error('Error:', error));
    }
  </script>
</body>

</html>
