Google Sheets v1
<input type="date" id="date">
<select id="shift">
  <option value="เช้า">เช้า</option>
  <option value="บ่าย">บ่าย</option>
  <option value="ดึก">ดึก</option>
</select>
<input type="text" id="name" placeholder="ชื่อของคุณ">
<button onclick="sendData()">บันทึกลง Google Sheets v1 </button>

<script>
  function sendData() {
    const url = "https://script.google.com/macros/library/d/1-MYvD1XaCzDTy_WcynldF5k5bo5B7NfNcNqs7nPb3H8BbOAR7V1TwLI7/2";
    const payload = {
      date: document.getElementById('date').value,
      shift: document.getElementById('shift').value,
      name: document.getElementById('name').value
    };

    fetch(url, {
      method: 'POST',
      body: JSON.stringify(payload)
    }).then(res => alert("บันทึกสำเร็จ!"));
  }
</script>
