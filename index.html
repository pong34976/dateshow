<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ระบบเวร - แดชบอร์ด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0f0c29;
      --bg2: radial-gradient(ellipse at 20% 0%, #302060 0%, #0f0c29 65%);
      --hdr: rgba(255, 255, 255, 0.05);
      --hdr-txt: #fff;
      --day-lbl: rgba(255, 255, 255, 0.45);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --txt: #ddd;
      --other: .22;
      --nav: rgba(255, 255, 255, 0.12);
      --nav-hov: rgba(255, 255, 255, 0.24);
      --accent: #7c4dff;
      --today-ring: #7c4dff;
      --sun: #ff6b6b;
      --sat: #80b0ff;
      --shadow: 0 8px 40px rgba(0, 0, 0, .55);
      --radius: 18px;
    }

    .t-coffee {
      --bg: #1c140d;
      --bg2: radial-gradient(ellipse at 20% 0%, #3d2b1f, #1c140d 65%);
      --hdr: rgba(215, 204, 200, 0.08);
      --hdr-txt: #efebe9;
      --day-lbl: rgba(188, 170, 164, 0.6);
      --cell: rgba(215, 204, 200, 0.05);
      --cell-hov: rgba(215, 204, 200, 0.1);
      --border: rgba(141, 110, 99, 0.2);
      --txt: #d7ccc8;
      --nav: rgba(141, 110, 99, 0.15);
      --nav-hov: rgba(141, 110, 99, 0.3);
      --accent: #a1887f;
      --today-ring: #ff5722;
      --sun: #ff5252;
      --sat: #64b5f6;
    }

    .t-dark {
      --bg: #000000;
      --bg2: radial-gradient(ellipse at 20% 0%, #0a0a0a, #000000 65%);
      --hdr: rgba(0, 255, 255, 0.05);
      --hdr-txt: #ffffff;
      --day-lbl: rgba(255, 255, 255, 0.4);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(0, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.1);
      --txt: #e0e0e0;
      --nav: rgba(255, 255, 255, 0.08);
      --nav-hov: rgba(0, 255, 255, 0.2);
      --accent: #00bcd4;
      --today-ring: #00bcd4;
      --sun: #ff1744;
      --sat: #2979ff;
    }

    .t-candy {
      --bg: #2d0a1c;
      --bg2: radial-gradient(ellipse at 20% 0%, #5c1839, #2d0a1c 65%);
      --hdr: rgba(255, 64, 129, 0.18);
      --hdr-txt: #ffffff;
      --day-lbl: #ff80ab;
      --cell: rgba(255, 128, 171, 0.1);
      --cell-hov: rgba(255, 64, 129, 0.22);
      --border: rgba(255, 128, 171, 0.25);
      --txt: #ffe0eb;
      --nav: rgba(255, 64, 129, 0.25);
      --nav-hov: rgba(255, 64, 129, 0.45);
      --accent: #ff4081;
      --today-ring: #ff1744;
      --sun: #ff1744;
      --sat: #f50057;
    }

    .t-paper {
      --bg: #fdfaf0;
      --bg2: linear-gradient(135deg, #ffffff, #f2ead3);
      --hdr: rgba(93, 64, 55, 0.08);
      --hdr-txt: #3e2723;
      --day-lbl: #5d4037;
      --txt: #261a15;
      --cell: rgba(255, 255, 255, 0.9);
      --cell-hov: rgba(93, 64, 55, 0.1);
      --border: #d7ccc8;
      --nav: rgba(93, 64, 55, 0.12);
      --nav-hov: rgba(93, 64, 55, 0.25);
      --accent: #8d6e63;
      --today-ring: #bf360c;
      --sun: #d32f2f;
      --sat: #1976d2;
    }

    :root {
      --c-joe: #a78bfa;
      --c-wan: #34d399;
      --c-flook: #60a5fa;
      --c-ae: #fbbf24;
      --btn-edit: #ff4081;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg2, var(--bg));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 40px;
      transition: background .4s;
    }

    .topbar {
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--hdr-txt);
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title .badge {
      font-size: .72rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .theme-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .theme-label {
      color: var(--day-lbl);
      font-size: .8rem;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .4);
    }

    .swatch:hover {
      transform: scale(1.2);
    }

    .swatch.active {
      border-color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .25);
    }

    .legend {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .leg-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .8rem;
      color: var(--hdr-txt);
      opacity: .85;
      text-decoration: none;
      cursor: pointer;
    }

    .leg-chip:hover {
      opacity: 1;
      transform: scale(1.05);
    }

    .leg-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .btn-action {
      padding: 6px 14px;
      background: var(--btn-edit);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
      display: inline-block;
    }

    .btn-action:hover {
      transform: scale(1.05);
    }

    .calendar {
      width: 100%;
      max-width: 1100px;
      background: var(--cell);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .cal-header {
      background: var(--hdr);
      padding: 20px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .cal-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--hdr-txt);
      letter-spacing: .3px;
    }

    .cal-title span {
      color: var(--accent);
    }

    .nav-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-btn {
      background: var(--nav);
      color: var(--hdr-txt);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .nav-btn:hover {
      background: var(--nav-hov);
      transform: scale(1.1);
      box-shadow: 0 0 10px var(--accent);
    }

    .today-btn {
      padding: 7px 16px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Sarabun', sans-serif;
      font-size: .88rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .today-btn:hover {
      opacity: .8;
      transform: scale(1.05);
    }

    .day-labels {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--hdr);
      border-bottom: 1px solid var(--border);
    }

    .day-lbl {
      text-align: center;
      padding: 10px 0;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--day-lbl);
      text-transform: uppercase;
    }

    .day-lbl.sun {
      color: var(--sun);
    }

    .day-lbl.sat {
      color: var(--sat);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cal-grid {
      animation: fadein .3s ease;
    }

    .cal-cell {
      min-height: 155px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background .2s;
      position: relative;
    }

    .cal-cell:nth-child(7n) {
      border-right: none;
    }

    .cal-cell:hover {
      background: var(--cell-hov);
    }

    .cal-cell.other-month {
      opacity: .3;
    }

    .cal-cell.is-today::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 2px solid var(--today-ring);
      border-radius: 2px;
      opacity: .5;
    }

    .day-num {
      font-size: .9rem;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--txt);
      transition: background .2s, color .2s;
      margin-bottom: 4px;
    }

    .cal-cell.is-today .day-num {
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #000));
      color: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .4);
    }

    .cal-cell.is-sun .day-num {
      color: var(--sun);
    }

    .cal-cell.is-sat .day-num {
      color: var(--sat);
    }

    .cal-cell.other-month .day-num {
      color: var(--txt);
    }

    .shifts {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    /* Custom colored shift slots for dashboard */
    .view-shift {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 4px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.88rem;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    /* Swap display */
    .view-shift.is-swapped {
      flex-direction: column;
      gap: 1px;
      padding: 5px 5px;
      position: relative;
    }

    .swap-old {
      text-decoration: line-through;
      opacity: .55;
      font-size: .72rem;
      font-weight: 600;
    }

    .swap-new {
      font-size: .85rem;
      font-weight: 800;
    }

    .swap-badge-idx {
      position: absolute;
      top: 2px;
      right: 3px;
      background: #00897b;
      color: #fff;
      font-size: .5rem;
      padding: 1px 4px;
      border-radius: 5px;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .cal-cell.is-sun,
    .cal-cell.is-holiday {
      background: rgba(255, 107, 107, 0.05);
    }

    .cal-cell.is-sat {
      background: rgba(128, 176, 255, 0.05);
    }

    .cal-cell.is-sun:hover,
    .cal-cell.is-holiday:hover {
      background: rgba(255, 107, 107, 0.1);
    }

    .cal-cell.is-sat:hover {
      background: rgba(128, 176, 255, 0.1);
    }

    .t-paper .cal-cell.is-sun,
    .t-paper .cal-cell.is-holiday {
      background: rgba(211, 47, 47, 0.06);
    }

    .t-paper .cal-cell.is-sat {
      background: rgba(25, 118, 210, 0.06);
    }
  </style>
</head>

<body>
  v 1
  <div class="topbar">
    <div class="app-title">
      📋 ระบบเวร
      <span class="badge">แดชบอร์ดรวม</span>
    </div>
    <div class="legend">
      <a href="view.html?u=joe" class="leg-chip" title="ดูเวร โจ้">
        <div class="leg-dot" style="background:var(--c-joe)"></div>โจ้
      </a>
      <a href="view.html?u=wan" class="leg-chip" title="ดูเวร ว่าน">
        <div class="leg-dot" style="background:var(--c-wan)"></div>ว่าน
      </a>
      <a href="view.html?u=flook" class="leg-chip" title="ดูเวร ฟลุ๊ค">
        <div class="leg-dot" style="background:var(--c-flook)"></div>ฟลุ๊ค
      </a>
      <a href="view.html?u=ae" class="leg-chip" title="ดูเวร เอ้">
        <div class="leg-dot" style="background:var(--c-ae)"></div>เอ้
      </a>
    </div>
    <div class="theme-bar">
      <a href="edit.html" class="btn-action">✏️ จัดการเวร</a>
      <a href="move.html" class="btn-action" style="background:#00897b;">🔄 แลกเวร</a>
      <a href="qhd.html" class="btn-action" style="background:#1565c0;">📅 ตารางงาน</a>
      <span class="theme-label" style="margin-left: 8px;">🎨</span>
      <div class="swatch" data-theme="cosmic" style="background:linear-gradient(135deg,#7c4dff,#0f0c29)" title="Cosmic">
      </div>
      <div class="swatch" data-theme="paper" style="background:linear-gradient(135deg,#795548,#f0ebe1)" title="Paper">
      </div>
      <div class="swatch" data-theme="coffee" style="background:linear-gradient(135deg,#3d2b1f,#1c140d)" title="Coffee">
      </div>
      <div class="swatch" data-theme="dark" style="background:linear-gradient(135deg,#1a1a1a,#000000)" title="Dark">
      </div>
      <div class="swatch" data-theme="candy" style="background:linear-gradient(135deg,#ff4081,#2d0a1c)" title="Candy">
      </div>
    </div>
  </div>

  <div class="calendar">
    <div class="cal-header">
      <div class="cal-title" id="calTitle">มีนาคม <span>2569</span></div>
      <div class="nav-group">
        <button class="today-btn" id="btnToday">วันนี้</button>
        <button class="nav-btn" id="btnPrev">&#8249;</button>
        <button class="nav-btn" id="btnNext">&#8250;</button>
      </div>
    </div>
    <div class="day-labels">
      <div class="day-lbl sun">อา</div>
      <div class="day-lbl">จ</div>
      <div class="day-lbl">อ</div>
      <div class="day-lbl">พ</div>
      <div class="day-lbl">พฤ</div>
      <div class="day-lbl">ศ</div>
      <div class="day-lbl sat">ส</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <script>
    const STORAGE_KEY = 'dutyMap_v1';
    const SWAP_KEY = 'swapMap_v1';

    const THAI_MONTHS = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
    const SHIFTS = [
      { key: 'เช้า', cls: 'morning', icon: '🌅', slots: 2 },
      { key: 'บ่าย', cls: 'afternoon', icon: '☀️', slots: 2 },
      { key: 'ดึก', cls: 'night', icon: '🌙', slots: 1 },
    ];

    const TODAY = new Date();
    let current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);

    let dutyMap = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    let swapMap = JSON.parse(localStorage.getItem(SWAP_KEY) || '{}');

    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function dutyKey(date, shift, slot) { return `${date}|${shift}|${slot}`; }

    // ─── Build Calendar Grid ─────────────────────────────
    function buildGrid(year, month) {
      const grid = document.getElementById('calGrid');
      grid.style.animation = 'none';
      grid.offsetHeight;
      grid.style.animation = '';
      grid.innerHTML = '';

      const first = new Date(year, month, 1);
      const totalDays = new Date(year, month + 1, 0).getDate();
      const startDow = first.getDay();
      const prevLast = new Date(year, month, 0).getDate();

      for (let i = startDow - 1; i >= 0; i--) {
        addCell(prevLast - i, true, new Date(year, month - 1, prevLast - i));
      }
      for (let d = 1; d <= totalDays; d++) {
        addCell(d, false, new Date(year, month, d));
      }
      const filled = startDow + totalDays;
      const total = Math.ceil(filled / 7) * 7;
      for (let i = 1; i <= total - filled; i++) {
        addCell(i, true, new Date(year, month + 1, i));
      }

      document.getElementById('calTitle').innerHTML =
        `${THAI_MONTHS[month]} <span>${year + 543}</span>`;
    }

    function addCell(dayNum, otherMonth, dateObj) {
      const grid = document.getElementById('calGrid');
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (otherMonth) cell.classList.add('other-month');

      const dow = dateObj.getDay();
      if (dow === 0) cell.classList.add('is-sun');
      if (dow === 6) cell.classList.add('is-sat');

      const isToday = !otherMonth &&
        dateObj.getFullYear() === TODAY.getFullYear() &&
        dateObj.getMonth() === TODAY.getMonth() &&
        dateObj.getDate() === TODAY.getDate();
      if (isToday) cell.classList.add('is-today');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = dayNum;
      if (otherMonth) {
        num.style.opacity = '0.5';
      }
      cell.appendChild(num);

      const dateStr = fmtDate(dateObj);

      const shiftsDiv = document.createElement('div');
      shiftsDiv.className = 'shifts';

      // 🛑 SHOW ALL ASSIGNED SHIFTS WITH HIGH CONTRAST BLOCK 🛑
      let hasAnyShift = false;
      SHIFTS.forEach(({ key, cls, icon, slots }) => {
        const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
        if (key === 'เช้า' && !isWeekend) return;

        let bgColor = '';
        let textColor = '#fff';
        let textShadow = '';

        // Applying requested colors: เช้า = สีเหลือง, บ่าย = สีส้ม, ดึก = สีฟ้าโทนมืด
        if (key === 'เช้า') {
          bgColor = '#fdd835'; // Yellow
          textColor = '#3e2723'; // Dark brown/black for contrast
        }
        else if (key === 'บ่าย') {
          bgColor = '#f57c00'; // Orange
          textColor = '#fff';
          textShadow = '0 1px 2px rgba(0,0,0,0.5)';
        }
        else if (key === 'ดึก') {
          bgColor = '#0d47a1'; // Dark Blue 
          textColor = '#fff';
          textShadow = '0 1px 2px rgba(0,0,0,0.5)';
        }

        for (let s = 1; s <= slots; s++) {
          const name = dutyMap[dutyKey(dateStr, key, s)] || '';
          if (name) {
            hasAnyShift = true;
            const dk = dutyKey(dateStr, key, s);
            const swapEntry = swapMap[dk];
            let html;
            if (swapEntry) {
              // แสดงชื่อเดิม (ขีดฆ่า) + ชื่อใหม่
              html = `
                <div class="view-shift is-swapped" style="background:${bgColor};color:${textColor};text-shadow:${textShadow};margin-bottom:4px;" title="${key} - แลกเวร: ${swapEntry.original} → ${swapEntry.requester}">
                  <span class="swap-badge-idx">แลก</span>
                  <span class="swap-old">${icon} ${swapEntry.original}</span>
                  <span class="swap-new">${swapEntry.requester}</span>
                </div>
              `;
            } else {
              html = `
                <a href="view.html?u=${name}" class="view-shift" style="background:${bgColor};color:${textColor};text-shadow:${textShadow};text-decoration:none;margin-bottom:4px;" title="${key} - ${name}">
                  <span>${icon} ${name}</span>
                </a>
              `;
            }
            shiftsDiv.insertAdjacentHTML('beforeend', html);
          }
        }
      });

      cell.appendChild(shiftsDiv);
      grid.appendChild(cell);
    }

    // ─── Nav buttons ─────────────────────────────────────
    document.getElementById('btnPrev').addEventListener('click', () => {
      current.setMonth(current.getMonth() - 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      current.setMonth(current.getMonth() + 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });
    document.getElementById('btnToday').addEventListener('click', () => {
      current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
      buildGrid(current.getFullYear(), current.getMonth());
    });

    // ─── Theme switcher (localStorage) ───────────────────────────────────
    const THEME_MAP = { cosmic: '', paper: 't-paper', candy: 't-candy', coffee: 't-coffee', dark: 't-dark' };
    const savedTheme = localStorage.getItem('theme') || '';
    document.body.className = savedTheme;

    document.querySelectorAll('.swatch').forEach(s => {
      const bodyClass = THEME_MAP[s.dataset.theme] || '';
      if (bodyClass === savedTheme || (!savedTheme && s.dataset.theme === 'cosmic')) {
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      }
      s.addEventListener('click', () => {
        const cls = THEME_MAP[s.dataset.theme] || '';
        document.body.className = cls;
        localStorage.setItem('theme', cls);
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      });
    });

    // ─── Init ─────────────────────────────────────────────
    buildGrid(current.getFullYear(), current.getMonth());
  </script>
</body>

</html>
