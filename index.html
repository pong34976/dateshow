<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ระบบเวร - แดชบอร์ด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0f0c29;
      --bg2: radial-gradient(ellipse at 20% 0%, #302060 0%, #0f0c29 65%);
      --hdr: rgba(255, 255, 255, 0.05);
      --hdr-txt: #fff;
      --day-lbl: rgba(255, 255, 255, 0.45);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --txt: #ddd;
      --other: .22;
      --nav: rgba(255, 255, 255, 0.12);
      --nav-hov: rgba(255, 255, 255, 0.24);
      --accent: #7c4dff;
      --today-ring: #7c4dff;
      --sun: #ff6b6b;
      --sat: #80b0ff;
      --shadow: 0 8px 40px rgba(0, 0, 0, .55);
      --radius: 18px;
    }

    .t-coffee {
      --bg: #1c140d;
      --bg2: radial-gradient(ellipse at 20% 0%, #3d2b1f, #1c140d 65%);
      --hdr: rgba(215, 204, 200, 0.08);
      --hdr-txt: #efebe9;
      --day-lbl: rgba(188, 170, 164, 0.6);
      --cell: rgba(215, 204, 200, 0.05);
      --cell-hov: rgba(215, 204, 200, 0.1);
      --border: rgba(141, 110, 99, 0.2);
      --txt: #d7ccc8;
      --nav: rgba(141, 110, 99, 0.15);
      --nav-hov: rgba(141, 110, 99, 0.3);
      --accent: #a1887f;
      --today-ring: #ff5722;
      --sun: #ff5252;
      --sat: #64b5f6;
    }

    .t-dark {
      --bg: #000000;
      --bg2: radial-gradient(ellipse at 20% 0%, #0a0a0a, #000000 65%);
      --hdr: rgba(0, 255, 255, 0.05);
      --hdr-txt: #ffffff;
      --day-lbl: rgba(255, 255, 255, 0.4);
      --cell: rgba(255, 255, 255, 0.03);
      --cell-hov: rgba(0, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.1);
      --txt: #e0e0e0;
      --nav: rgba(255, 255, 255, 0.08);
      --nav-hov: rgba(0, 255, 255, 0.2);
      --accent: #00bcd4;
      --today-ring: #00bcd4;
      --sun: #ff1744;
      --sat: #2979ff;
    }

    .t-candy {
      --bg: #2d0a1c;
      --bg2: radial-gradient(ellipse at 20% 0%, #5c1839, #2d0a1c 65%);
      --hdr: rgba(255, 64, 129, 0.18);
      --hdr-txt: #ffffff;
      --day-lbl: #ff80ab;
      --cell: rgba(255, 128, 171, 0.1);
      --cell-hov: rgba(255, 64, 129, 0.22);
      --border: rgba(255, 128, 171, 0.25);
      --txt: #ffe0eb;
      --nav: rgba(255, 64, 129, 0.25);
      --nav-hov: rgba(255, 64, 129, 0.45);
      --accent: #ff4081;
      --today-ring: #ff1744;
      --sun: #ff1744;
      --sat: #f50057;
    }

    .t-paper {
      --bg: #fdfaf0;
      --bg2: linear-gradient(135deg, #ffffff, #f2ead3);
      --hdr: rgba(93, 64, 55, 0.08);
      --hdr-txt: #3e2723;
      --day-lbl: #5d4037;
      --txt: #261a15;
      --cell: rgba(255, 255, 255, 0.9);
      --cell-hov: rgba(93, 64, 55, 0.1);
      --border: #d7ccc8;
      --nav: rgba(93, 64, 55, 0.12);
      --nav-hov: rgba(93, 64, 55, 0.25);
      --accent: #8d6e63;
      --today-ring: #bf360c;
      --sun: #d32f2f;
      --sat: #1976d2;
    }

    :root {
      --c-joe: #a78bfa;
      --c-wan: #34d399;
      --c-flook: #60a5fa;
      --c-ae: #fbbf24;
      --btn-edit: #ff4081;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg2, var(--bg));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 12px 40px;
      transition: background .4s;
      color: var(--txt);
    }

    .topbar {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      margin-bottom: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, .045);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .24);
      backdrop-filter: blur(12px);
    }

    .app-title {
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--hdr-txt);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .app-title .badge {
      font-size: .72rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .theme-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      grid-column: 2;
      grid-row: 1;
    }

    .action-group,
    .theme-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .theme-group {
      padding-left: 10px;
      border-left: 1px solid var(--border);
    }

    .theme-label {
      color: var(--day-lbl);
      font-size: .8rem;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .4);
    }

    .swatch:hover {
      transform: scale(1.2);
    }

    .swatch.active {
      border-color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .25);
    }

    .legend {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      grid-column: 1 / -1;
      padding-top: 2px;
    }

    .leg-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .86rem;
      color: var(--hdr-txt);
      opacity: .95;
      text-decoration: none;
      cursor: pointer;
      min-height: 28px;
      padding: 2px 4px;
    }

    .leg-chip:hover {
      opacity: 1;
      transform: scale(1.05);
    }

    .leg-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .btn-action {
      padding: 8px 13px;
      background: var(--btn-edit);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1.2;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s, filter .2s, box-shadow .2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 38px;
      border: none;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      white-space: nowrap;
    }

    .btn-action:hover {
      transform: scale(1.05);
      filter: brightness(1.08);
      box-shadow: 0 4px 14px rgba(0, 0, 0, .36);
    }

    .calendar {
      width: 100%;
      max-width: 1100px;
      background: var(--cell);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .calendar-only-exit {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2500;
      display: none;
      background: var(--accent);
    }

    .cal-header {
      background: var(--hdr);
      padding: 20px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .cal-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--hdr-txt);
    }

    .cal-title span {
      color: var(--accent);
    }

    .nav-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-btn {
      background: var(--nav);
      color: var(--hdr-txt);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .nav-btn:hover {
      background: var(--nav-hov);
      transform: scale(1.1);
      box-shadow: 0 0 10px var(--accent);
    }

    .today-btn {
      padding: 7px 16px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Sarabun', sans-serif;
      font-size: .88rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .today-btn:hover {
      opacity: .8;
      transform: scale(1.05);
    }

    .day-labels {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      background: var(--hdr);
      border-bottom: 1px solid var(--border);
    }

    .day-lbl {
      text-align: center;
      padding: 10px 0;
      font-size: .82rem;
      font-weight: 700;
      color: var(--day-lbl);
      text-transform: uppercase;
    }

    .day-lbl.sun {
      color: var(--sun);
    }

    .day-lbl.sat {
      color: var(--sat);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cal-grid {
      animation: fadein .3s ease;
    }

    .cal-cell {
      min-height: 155px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background .2s;
      position: relative;
    }

    .cal-cell:nth-child(7n) {
      border-right: none;
    }

    .cal-cell:hover {
      background: var(--cell-hov);
    }

    .cal-cell.other-month {
      opacity: .3;
    }

    .cal-cell.is-today::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 2px solid var(--today-ring);
      border-radius: 2px;
      opacity: .5;
    }

    .day-num {
      font-size: .9rem;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--txt);
      transition: background .2s, color .2s;
      margin-bottom: 4px;
    }

    .cal-cell.is-today .day-num {
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #000));
      color: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .4);
    }

    .cal-cell.is-sun .day-num {
      color: var(--sun);
    }

    .cal-cell.is-sat .day-num {
      color: var(--sat);
    }

    .cal-cell.other-month .day-num {
      color: var(--txt);
    }

    .shifts {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    /* Custom colored shift slots for dashboard */
    .view-shift {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 4px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.15;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      min-height: 30px;
      text-align: center;
      word-break: keep-all;
    }

    /* Swap display */
    .view-shift.is-swapped {
      flex-direction: column;
      gap: 1px;
      padding: 5px 5px;
      position: relative;
    }

    .swap-old {
      text-decoration: line-through;
      opacity: .68;
      font-size: .78rem;
      font-weight: 600;
    }

    .swap-new {
      font-size: .92rem;
      font-weight: 800;
    }

    .swap-badge-idx {
      position: absolute;
      top: 2px;
      right: 3px;
      background: #00897b;
      color: #fff;
      font-size: .5rem;
      padding: 1px 4px;
      border-radius: 5px;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .cal-cell.is-sun,
    .cal-cell.is-holiday {
      background: rgba(255, 107, 107, 0.05);
    }

    .cal-cell.is-sat {
      background: rgba(128, 176, 255, 0.05);
    }

    .cal-cell.is-sun:hover,
    .cal-cell.is-holiday:hover {
      background: rgba(255, 107, 107, 0.1);
    }

    .cal-cell.is-sat:hover {
      background: rgba(128, 176, 255, 0.1);
    }

    .t-paper .cal-cell.is-sun,
    .t-paper .cal-cell.is-holiday {
      background: rgba(211, 47, 47, 0.06);
    }

    .t-paper .cal-cell.is-sat {
      background: rgba(25, 118, 210, 0.06);
    }

    /* Holiday label */
    .holiday-label {
      font-size: .65rem;
      font-weight: 700;
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.13);
      border-radius: 5px;
      padding: 2px 5px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      display: block;
    }

    .t-paper .holiday-label {
      color: #c62828;
      background: rgba(198, 40, 40, 0.08);
    }

    /* Swap log table */
    .swap-log {
      width: 100%;
      max-width: 1100px;
      margin-top: 24px;
      background: var(--cell);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: none;
    }

    .log-hdr {
      background: var(--hdr);
      padding: 14px 22px;
      font-size: .95rem;
      font-weight: 700;
      color: var(--hdr-txt);
      border-bottom: 1px solid var(--border);
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .83rem;
    }

    .log-table th {
      padding: 9px 14px;
      text-align: left;
      color: var(--day-lbl);
      font-weight: 600;
      font-size: .75rem;
      background: rgba(255, 255, 255, .03);
      border-bottom: 1px solid var(--border);
    }

    .log-table td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--txt);
      vertical-align: middle;
    }

    .log-table tr:last-child td {
      border-bottom: none;
    }

    .tag-swap {
      background: #00897b;
      color: #fff;
      font-size: .6rem;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 700;
      vertical-align: middle;
      margin-left: 4px;
    }

    body.calendar-only {
      padding: 0;
      overflow: hidden;
    }

    body.calendar-only .topbar,
    body.calendar-only .swap-log {
      display: none !important;
    }

    body.calendar-only .calendar {
      width: 100vw;
      max-width: none;
      height: 100vh;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
    }

    body.calendar-only .cal-header {
      flex: 0 0 auto;
      padding: 10px 60px 10px 14px;
    }

    body.calendar-only .day-labels {
      flex: 0 0 auto;
    }

    body.calendar-only .cal-grid {
      flex: 1;
      min-height: 0;
      grid-auto-rows: minmax(0, 1fr);
    }

    body.calendar-only .cal-cell {
      min-height: 0;
      padding: 5px;
      overflow: hidden;
    }

    body.calendar-only .view-shift {
      min-height: 26px;
      padding: 4px 3px;
      font-size: .86rem;
    }

    body.calendar-only .calendar-only-exit {
      display: inline-flex;
      width: auto;
      min-width: 52px;
    }

    @media (max-width: 760px) {
      body {
        padding: 8px 6px 28px;
      }

      .topbar {
        grid-template-columns: 1fr;
        padding: 10px;
        gap: 10px;
      }

      .app-title {
        font-size: 1rem;
      }

      .theme-bar,
      .action-group {
        width: 100%;
        justify-content: stretch;
      }

      .theme-bar {
        grid-column: auto;
        grid-row: auto;
      }

      .action-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .btn-action {
        width: 100%;
        min-height: 42px;
        padding: 9px 8px;
        font-size: .9rem;
      }

      .theme-group {
        width: 100%;
        justify-content: center;
        border-left: 0;
        padding-left: 0;
        padding-top: 4px;
      }

      .legend {
        gap: 6px;
      }

      .leg-chip {
        flex: 1 1 calc(50% - 6px);
        justify-content: center;
        background: rgba(255, 255, 255, .055);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .calendar {
        border-radius: 12px;
      }

      .cal-header {
        padding: 12px 10px;
        align-items: stretch;
      }

      .cal-title {
        width: 100%;
        font-size: 1.25rem;
        text-align: center;
      }

      .nav-group {
        width: 100%;
        justify-content: center;
      }

      .today-btn {
        min-height: 40px;
      }

      .nav-btn {
        width: 42px;
        height: 42px;
      }

      .day-lbl {
        padding: 8px 0;
        font-size: .78rem;
      }

      .cal-cell {
        min-height: 112px;
        padding: 5px 3px;
      }

      .day-num {
        width: 24px;
        height: 24px;
        font-size: .84rem;
        margin-bottom: 2px;
      }

      .shifts {
        gap: 3px;
      }

      .view-shift {
        min-height: 28px;
        padding: 4px 2px;
        font-size: .82rem;
        gap: 3px;
      }

      .view-shift.is-swapped {
        padding: 4px 2px;
      }

      .swap-old {
        font-size: .68rem;
      }

      .swap-new {
        font-size: .78rem;
      }

      .swap-badge-idx {
        font-size: .48rem;
        padding: 1px 3px;
      }

      .holiday-label {
        font-size: .58rem;
        padding: 1px 3px;
      }

      .swap-log {
        overflow-x: auto;
      }

      .log-table {
        min-width: 720px;
      }

      body.calendar-only .calendar-only-exit {
        width: auto;
      }
    }

    @media (max-width: 420px) {
      .action-group {
        grid-template-columns: 1fr;
      }

      .cal-cell {
        min-height: 96px;
      }

      .view-shift {
        font-size: .74rem;
      }

      .swap-old {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="app-title">
      📋 ระบบเวร
      <span class="badge">แดชบอร์ดรวม</span>
    </div>
    <div class="legend" id="staffLegend">
      <!-- ตำนานจะกูสร้างจาก JS อัตโนมัติ -->
    </div>
    <div class="theme-bar">
      <div class="action-group">
        <a href="qhd.html" class="btn-action" style="background:#1565c0;">📅 ตารางงาน</a>
        <a href="edit.html" class="btn-action">✏️ ตั้งเวร</a>
        <a href="addall.html" class="btn-action" style="background:#6d4c41;">➕ เพิ่มเวร</a>
        <a href="move.html" class="btn-action" style="background:#00897b;">🔄 แลกเวร</a>
        <a href="sell.html" class="btn-action" style="background:#e65100;">🏷️ ขายเวร</a>
        <button id="btnCalendarOnly" type="button" class="btn-action" style="background:#455a64;">🗓️ ปฏิทิน</button>
        <button onclick="syncFromCloud()" class="btn-action" style="background:#e53935;">
          🔄 Refresh
        </button>
      </div>

      <div class="theme-group">
        <span class="theme-label">🎨</span>
        <div class="swatch" data-theme="cosmic" style="background:linear-gradient(135deg,#7c4dff,#0f0c29)" title="Cosmic">
        </div>
        <div class="swatch" data-theme="paper" style="background:linear-gradient(135deg,#795548,#f0ebe1)" title="Paper">
        </div>
        <div class="swatch" data-theme="coffee" style="background:linear-gradient(135deg,#3d2b1f,#1c140d)" title="Coffee">
        </div>
        <div class="swatch" data-theme="dark" style="background:linear-gradient(135deg,#1a1a1a,#000000)" title="Dark">
        </div>
        <div class="swatch" data-theme="candy" style="background:linear-gradient(135deg,#ff4081,#2d0a1c)" title="Candy">
        </div>
      </div>
    </div>
  </div>

  <button id="btnExitCalendarOnly" type="button" class="btn-action calendar-only-exit">ออก</button>

  <div class="calendar">
    <div class="cal-header">

  <script>
    const GS_URL = 'https://script.google.com/macros/s/AKfycbxwkcBPudJEr_FfHrLvaEOrPjzdu3wC9G3HUHOue_cc--zLoPGVcQNDMS8Tgrv1Q3lx/exec';
    const STORAGE_KEY = 'dutyMap_v1';
    const SWAP_KEY = 'swapMap_v1';
    const HOLIDAY_KEY = 'holidayMap_v1';
    const HOLIDAY_TTL = 6 * 60 * 60 * 1000; // 6 hours

    // ─── Holiday Map (date string → holiday name) ─────────
    let holidayMap = {};
    function loadHolidayCache() {
      try {
        const raw = localStorage.getItem(HOLIDAY_KEY);
        if (!raw) return false;
        const { ts, data } = JSON.parse(raw);
        if (Date.now() - ts > HOLIDAY_TTL) return false;
        holidayMap = data;
        return true;
      } catch { return false; }
    }
    function saveHolidayCache() {
      try {
        localStorage.setItem(HOLIDAY_KEY, JSON.stringify({ ts: Date.now(), data: holidayMap }));
      } catch { }
    }

    // Parse iCal text → map of date string → holiday name (only วันหยุดนักขัตฤกษ์)
    // (ใช้กรณี fallback เท่านั้น)
    function parseIcal(text) {
      const map = {};
      const events = text.split('BEGIN:VEVENT');
      for (let i = 1; i < events.length; i++) {
        const ev = events[i];
        // Unfold continuation lines (lines starting with space/tab)
        const unfolded = ev.replace(/\r?\n[ \t]/g, '');
        const dtmatch = unfolded.match(/DTSTART(?:;[^:]*)?:([\d]{8})/);
        const summatch = unfolded.match(/SUMMARY:(.+?)(?:\r?\n|$)/);
        const descmatch = unfolded.match(/DESCRIPTION:(.+?)(?:\r?\n|$)/);
        if (!dtmatch || !summatch) continue;
        const desc = descmatch ? descmatch[1] : '';
        // Only include public holidays (วันหยุดนักขัตฤกษ์)
        if (!desc.includes('วันหยุดนักขัตฤกษ์')) continue;
        const raw = dtmatch[1]; // e.g. '20260406'
        const dateStr = `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)}`;
        const name = summatch[1].trim();
        if (!map[dateStr]) map[dateStr] = name;
      }
      return map;
    }

    // ─── Hardcoded Thai public holidays fallback (วันหยุดนักขัตฤกษ์) ───
    const HOLIDAY_FALLBACK = {
      // 2025 (2568)
      '2025-01-01': 'วันขึ้นปีใหม่',
      '2025-02-12': 'วันมาฆบูชา',
      '2025-04-06': 'วันจักรี',
      '2025-04-13': 'วันสงกรานต์',
      '2025-04-14': 'วันสงกรานต์',
      '2025-04-15': 'วันสงกรานต์',
      '2025-05-01': 'วันแรงงานแห่งชาติ',
      '2025-05-04': 'วันฉัตรมงคล',
      '2025-05-12': 'วันหยุดชดเชยวันวิสาขบูชา',
      '2025-06-03': 'วันเฉลิมพระชนมพรรษาสมเด็จพระนางเจ้าฯ',
      '2025-07-28': 'วันเฉลิมพระชนมพรรษา รัชกาลที่ 10',

      '2025-07-30': 'วันเข้าพรรษา',
      '2025-08-12': 'วันเฉลิมพระชนมพรรษา สมเด็จพระบรมราชชนนีพันปีหลวง',
      '2025-10-13': 'วันนวมินทรมหาราช',
      '2025-10-23': 'วันปิยมหาราช',
      '2025-12-05': 'วันพ่อแห่งชาติ',
      '2025-12-10': 'วันรัฐธรรมนูญ',
      '2025-12-31': 'วันสิ้นปี',
      // 2026 (2569)
      '2026-01-01': 'วันขึ้นปีใหม่',
      '2026-01-02': 'วันหยุดราชการเพิ่มเป็นกรณีพิเศษ',
      '2026-03-03': 'วันมาฆบูชา',
      '2026-04-06': 'วันจักรี',
      '2026-04-13': 'วันสงกรานต์',
      '2026-04-14': 'วันสงกรานต์',
      '2026-04-15': 'วันสงกรานต์',
      '2026-05-01': 'วันแรงงานแห่งชาติ',
      '2026-05-04': 'วันฉัตรมงคล',
      '2026-06-01': 'วันหยุดชดเชยวันวิสาขบูชา',
      '2026-06-03': 'วันเฉลิมพระชนมพรรษาสมเด็จพระนางเจ้าฯ',
      '2026-07-28': 'วันเฉลิมพระชนมพรรษา รัชกาลที่ 10',
      '2026-07-29': 'วันอาสาฬหบูชา',
      '2026-07-30': 'วันเข้าพรรษา',
      '2026-08-12': 'วันเฉลิมพระชนมพรรษา สมเด็จพระบรมราชชนนีพันปีหลวง',
      '2026-10-13': 'วันนวมินทรมหาราช',
      '2026-10-23': 'วันปิยมหาราช',
      '2026-12-07': 'วันหยุดชดเชยวันพ่อแห่งชาติ',
      '2026-12-10': 'วันรัฐธรรมนูญ',
      '2026-12-31': 'วันสิ้นปี',
    };

    async function fetchHolidays() {
      // Always load fallback first so calendar shows immediately
      holidayMap = { ...HOLIDAY_FALLBACK };

      // Try to load cache from previous sync (if fresh)
      if (loadHolidayCache()) {
        holidayMap = { ...HOLIDAY_FALLBACK, ...holidayMap };
        buildGrid(current.getFullYear(), current.getMonth());
        return;
      }

      // No fresh cache — show fallback while waiting for sync
      buildGrid(current.getFullYear(), current.getMonth());
      // (holidays will update via syncFromCloud)
    }

    const THAI_MONTHS = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
    const SHIFTS = [
      { key: 'เช้า', display: 'ช', time: '08:00-16:00', start: 8, end: 16, cls: 'morning', icon: 'ช', slots: 2 },
      { key: 'บ่าย', display: 'บ', time: '16:00-24:00', start: 16, end: 24, cls: 'afternoon', icon: 'บ', slots: 2 },
      { key: 'ดึก', display: 'ด', time: '00:00-08:00', start: 0, end: 8, cls: 'night', icon: 'ด', slots: 1 },
      { key: 'โรบินสัน', display: 'ร', time: '10:00-20:00', start: 10, end: 20, cls: 'robinson', icon: 'ร', slots: 1 },
    ];

    const TODAY = new Date();
    let current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);

    let dutyMap = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    let swapMap = JSON.parse(localStorage.getItem(SWAP_KEY) || '{}')
    let sellMap = JSON.parse(localStorage.getItem('sellMap_v1') || '{}');
    let sellTransferMap = JSON.parse(localStorage.getItem('sellTransferMap_v1') || '{}');

    const DEFAULT_STAFF = {
      'โจ้': { name: 'โจ้', color: '#a78bfa' },
      'ว่าน': { name: 'ว่าน', color: '#34d399' },
      'ฟลุ๊ค': { name: 'ฟลุ๊ค', color: '#60a5fa' },
      'เอ้': { name: 'เอ้', color: '#fbbf24' }
    };
    let staffMap = JSON.parse(localStorage.getItem('staffMap_v1') || 'null') || DEFAULT_STAFF;

    function renderLegend() {
      const legObj = document.getElementById('staffLegend');
      if (!legObj) return;
      legObj.innerHTML = '';

      // ─── นับเวรต่อคนในเดือนที่กำลังดู ───
      const yr = current.getFullYear();
      const mo = current.getMonth();
      const pfx = `${yr}-${String(mo + 1).padStart(2, '0')}-`; // e.g. "2026-04-"
      const countMap = {}; // name → { total, เช้า, บ่าย, ดึก }
      Object.keys(staffMap).forEach(k => { countMap[k] = { total: 0, 'เช้า': 0, 'บ่าย': 0, 'ดึก': 0 }; });

      Object.entries(dutyMap).forEach(([dk, name]) => {
        if (!dk.startsWith(pfx)) return; // ข้ามเดือนอื่น
        const parts = dk.split('|');
        const shift = parts[1] || '';

        // คำนึงถึง swap และ transfer ด้วย
        const swapEntry = swapMap[dk];
        const transferEntry = sellTransferMap[dk];
        let effectiveName = name;
        if (transferEntry) effectiveName = transferEntry.buyer;
        else if (swapEntry) effectiveName = swapEntry.requester;

        // นับคนที่ถูก swap/transfer ด้วย (ใช้ effectiveName แทน)
        if (countMap[effectiveName]) {
          countMap[effectiveName].total++;
          if (countMap[effectiveName][shift] !== undefined) countMap[effectiveName][shift]++;
        }
      });

      Object.keys(staffMap).forEach(k => {
        const st = staffMap[k];
        const cnt = countMap[k] || { total: 0, 'เช้า': 0, 'บ่าย': 0, 'ดึก': 0 };
        const a = document.createElement('a');
        a.href = `view.html?n=${encodeURIComponent(st.name)}`;
        a.className = 'leg-chip';
        const tip = `เช้า ${cnt['เช้า']} · บ่าย ${cnt['บ่าย']} · ดึก ${cnt['ดึก']}`;
        a.title = `ดูเวร ${st.name} — ${tip}`;
        a.innerHTML = `
          <div class="leg-dot" style="background:${st.color}"></div>
          ${st.name}
          <span style="font-size:.72rem;opacity:.75;background:rgba(255,255,255,.1);
            padding:1px 6px;border-radius:10px;margin-left:2px;font-weight:600;
            color:${st.color};">${cnt.total}</span>`;
        legObj.appendChild(a);
      });

      // ปุ่ม + เพิ่มรายชื่อ
      const addBtn = document.createElement('button');
      addBtn.className = 'leg-chip';
      addBtn.style.border = '1px dashed var(--border)';
      addBtn.style.background = 'rgba(255,255,255,0.05)';
      addBtn.style.cursor = 'pointer';
      addBtn.style.color = 'var(--day-lbl)';
      addBtn.innerHTML = `➕ เพิ่มรายชื่อ`;
      addBtn.onclick = () => promptAddStaff();
      legObj.appendChild(addBtn);
    }

    function promptAddStaff() {
      const name = prompt("ใส่ชื่อคนที่ต้องการเพิ่ม:");
      if (!name) return;
      const letters = '89ABCDEF';
      let rcolor = '#';
      for (let i = 0; i < 6; i++) { rcolor += letters[Math.floor(Math.random() * 8)]; }
      const color = prompt("ใส่สีประจำตัว (เช่น #ff0000, blue) ถ้าไม่ใส่จะสุ่มให้:", "") || rcolor;
      staffMap[name] = { name, color };
      localStorage.setItem('staffMap_v1', JSON.stringify(staffMap));
      renderLegend();

      const p = { action: 'addStaff', name, color };
      fetch(GS_URL + '?' + new URLSearchParams(p).toString() + '&t=' + Date.now(), { mode: 'no-cors' }).catch(e => console.warn(e));

      console.log(`✅ เพิ่ม ${name} สำเร็จ (ข้อมูลจะถูก Sync ไปยังแผ่นงาน)`);
      location.reload();
    }

    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function dutyKey(date, shift, slot) { return `${date}|${shift}|${slot}`; }

    // ─── Build Calendar Grid ─────────────────────────────
    function buildGrid(year, month) {
      const grid = document.getElementById('calGrid');
      grid.style.animation = 'none';
      grid.offsetHeight;
      grid.style.animation = '';
      grid.innerHTML = '';

      const first = new Date(year, month, 1);
      const totalDays = new Date(year, month + 1, 0).getDate();
      const startDow = first.getDay();
      const prevLast = new Date(year, month, 0).getDate();

      for (let i = startDow - 1; i >= 0; i--) {
        addCell(prevLast - i, true, new Date(year, month - 1, prevLast - i));
      }
      for (let d = 1; d <= totalDays; d++) {
        addCell(d, false, new Date(year, month, d));
      }
      const filled = startDow + totalDays;
      const total = Math.ceil(filled / 7) * 7;
      for (let i = 1; i <= total - filled; i++) {
        addCell(i, true, new Date(year, month + 1, i));
      }

      document.getElementById('calTitle').innerHTML =
        `${THAI_MONTHS[month]} <span>${year + 543}</span>`;
    }

    function addCell(dayNum, otherMonth, dateObj) {
      const grid = document.getElementById('calGrid');
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (otherMonth) cell.classList.add('other-month');

      const dow = dateObj.getDay();
      if (dow === 0) cell.classList.add('is-sun');
      if (dow === 6) cell.classList.add('is-sat');

      const dateStr = fmtDate(dateObj);
      const holidayName = holidayMap[dateStr];
      if (holidayName && dow !== 0 && dow !== 6) cell.classList.add('is-holiday');

      const isToday = !otherMonth &&
        dateObj.getFullYear() === TODAY.getFullYear() &&
        dateObj.getMonth() === TODAY.getMonth() &&
        dateObj.getDate() === TODAY.getDate();
      if (isToday) cell.classList.add('is-today');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = dayNum;
      cell.appendChild(num);

      if (holidayName && !otherMonth) {
        const lbl = document.createElement('span');
        lbl.className = 'holiday-label';
        lbl.title = holidayName;
        lbl.textContent = '🎌 ' + holidayName;
        cell.appendChild(lbl);
      }

      const shiftsDiv = document.createElement('div');
      shiftsDiv.className = 'shifts';

      let hasAnyShift = false;
      SHIFTS.forEach(({ key, cls, icon, slots }) => {
        const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
        const isHoliday = !!holidayMap[dateStr];
        if (key === 'เช้า' && !isWeekend && !isHoliday) return;

        let bgColor = '';
        let textColor = '#fff';
        let textShadow = '';

        if (key === 'เช้า') {
          bgColor = '#fdd835';
          textColor = '#3e2723';
        } else if (key === 'บ่าย') {
          bgColor = '#f57c00';
          textColor = '#fff';
          textShadow = '0 1px 2px rgba(0,0,0,0.5)';
        } else if (key === 'ดึก') {
          bgColor = '#0d47a1';
          textColor = '#fff';
          textShadow = '0 1px 2px rgba(0,0,0,0.5)';
        } else if (key === 'โรบินสัน') {
          bgColor = '#00897b';
          textColor = '#fff';
          textShadow = '0 1px 2px rgba(0,0,0,0.5)';
        }

        for (let s = 1; s <= slots; s++) {
          const name = dutyMap[dutyKey(dateStr, key, s)] || '';
          if (name) {
            hasAnyShift = true;
            const dk = dutyKey(dateStr, key, s);
            const swapEntry = swapMap[dk];
            const sellEntry = sellMap[dk];
            const transferEntry = sellTransferMap[dk];
            let html;
            if (swapEntry) {
              // แลกเวร: ~~original~~ แลก requester
              html = `
                <div class="view-shift is-swapped" style="background:${bgColor};color:${textColor};text-shadow:${textShadow};margin-bottom:4px;" title="${key} - แลกเวร: ${swapEntry.original} → ${swapEntry.requester}">
                  <span class="swap-badge-idx">แลก</span>
                  <span class="swap-old">${icon} ${swapEntry.original}</span>
                  <span class="swap-new">${swapEntry.requester}</span>
                </div>
              `;
            } else if (transferEntry) {
              // ขายเวร: ~~seller~~ ขาย buyer
              const displayBuyer = transferEntry.buyer; // ป้องกันบักตอน sync ทีหลัง
              html = `
                <div class="view-shift is-swapped" style="background:${bgColor};color:${textColor};text-shadow:${textShadow};margin-bottom:4px;" title="${key} - ขาย: ${transferEntry.original} → ${displayBuyer}">
                  <span class="swap-badge-idx" style="background:#e65100;">ขาย</span>
                  <span class="swap-old">${icon} ${transferEntry.original}</span>
                  <span class="swap-new">${displayBuyer}</span>
                </div>
              `;
            } else if (sellEntry) {
              // ประกาศขาย — ยังหาคนแทน
              html = `
                <div class="view-shift" style="background:${bgColor};color:${textColor};text-shadow:${textShadow};margin-bottom:4px;cursor:pointer;"
                  title="คลิกเพื่อเลือกคนแทน ${name}"
                  onclick="openBuyModal('${dk}','${dateStr}','${key}','${s}','${name}')">
                  <span class="swap-badge-idx" style="background:#e65100;position:relative;top:0;right:0;">ขาย</span>
                  <span>${icon} ${name}</span>
                  <span style="font-size:.7rem;opacity:.75;margin-left:2px;">หาคนแทน</span>
                </div>
              `;
            } else {
              html = `
                <a href="view.html?u=${name}" class="view-shift" style="background:${bgColor};color:${textColor};text-shadow:${textShadow};text-decoration:none;margin-bottom:4px;" title="${key} - ${name}">
                  <span>${icon} ${name}</span>
                </a>
              `;
            }
            shiftsDiv.insertAdjacentHTML('beforeend', html);
          }
        }
      });

      cell.appendChild(shiftsDiv);
      grid.appendChild(cell);
    }

    // ─── Nav buttons ─────────────────────────────────────
    document.getElementById('btnPrev').addEventListener('click', () => {
      current.setMonth(current.getMonth() - 1);
      buildGrid(current.getFullYear(), current.getMonth());
      renderLegend();
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      current.setMonth(current.getMonth() + 1);
      buildGrid(current.getFullYear(), current.getMonth());
      renderLegend();
    });
    document.getElementById('btnToday').addEventListener('click', () => {
      current = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
      buildGrid(current.getFullYear(), current.getMonth());
      renderLegend();
    });

    // ─── Theme switcher (localStorage) ───────────────────────────────────
    const THEME_MAP = { cosmic: '', paper: 't-paper', candy: 't-candy', coffee: 't-coffee', dark: 't-dark' };
    const THEME_CLASSES = Object.values(THEME_MAP).filter(Boolean);
    const savedTheme = localStorage.getItem('theme') || '';

    function applyTheme(cls) {
      document.body.classList.remove(...THEME_CLASSES);
      if (cls) document.body.classList.add(cls);
    }

    function setCalendarOnly(on) {
      document.body.classList.toggle('calendar-only', on);
      localStorage.setItem('calendarOnly_v1', on ? '1' : '0');
      const btn = document.getElementById('btnCalendarOnly');
      if (btn) btn.textContent = on ? '↩️ ปกติ' : '🗓️ ปฏิทิน';
    }

    applyTheme(savedTheme);

    document.querySelectorAll('.swatch').forEach(s => {
      const bodyClass = THEME_MAP[s.dataset.theme] || '';
      if (bodyClass === savedTheme || (!savedTheme && s.dataset.theme === 'cosmic')) {
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      }
      s.addEventListener('click', () => {
        const cls = THEME_MAP[s.dataset.theme] || '';
        applyTheme(cls);
        localStorage.setItem('theme', cls);
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      });
    });

    // ─── Init ─────────────────────────────────────────────
    document.getElementById('btnCalendarOnly')?.addEventListener('click', () => {
      setCalendarOnly(!document.body.classList.contains('calendar-only'));
    });
    document.getElementById('btnExitCalendarOnly')?.addEventListener('click', () => setCalendarOnly(false));
    setCalendarOnly(localStorage.getItem('calendarOnly_v1') === '1');

    renderLegend();
    fetchHolidays(); // โหลดวันหยุดก่อน แล้ว buildGrid ข้างในจะเรียกเอง
    renderActivityLog();

    const AUTO_SYNC_MINUTES = 30;

    async function syncFromCloud(isAuto = false) {
      if (!isAuto && !confirm('ยืนยันดึงข้อมูลล่าสุดจาก Google Sheets?')) return;

      const btn = document.querySelector('button[onclick="syncFromCloud()"]');
      let oldTxt = btn ? btn.innerHTML : '🔄 Refresh';

      try {
        // 1. Check Update Time
        const checkRes = await fetch(GS_URL + '?action=checkUpdate&t=' + Date.now());
        const checkJson = await checkRes.json();

        // ถ้าไม่มี lastUpdate แปลว่ายังไม่ได้ Deploy Apps Script ใหม่
        if (checkJson.lastUpdate === undefined) {
          throw new Error('API ล่าสุดยังไม่ถูก Deploy กรุณาไปที่ Apps Script และกด Deploy -> New version ครับ');
        }

        const serverUpdate = checkJson.lastUpdate || 0;
        const localUpdate = localStorage.getItem('last_update_time_v1') || 0;

        // Skip if auto-sync and already up to date
        if (isAuto && String(serverUpdate) === String(localUpdate)) {
          return;
        }

        if (btn) {
          btn.innerHTML = '🔄 10%...';
          btn.style.opacity = '0.8';
          btn.disabled = true;
        }

        // Fetch sheets concurrently to speed up
        const sheetsToFetch = [
          { name: '0', pctStep: 20 },
          { name: 'swap', pctStep: 15 },
          { name: 'sell', pctStep: 15 },
          { name: 'sellTransfer', pctStep: 15 },
          { name: 'staff', pctStep: 10 },
          { name: 'วันหยุด', pctStep: 10 }
        ];

        let fetchedData = {};
        let currentPct = 10;

        const fetchPromises = sheetsToFetch.map(async (s) => {
          try {
            const res = await fetch(GS_URL + `?action=syncSheet&sheetName=${s.name}&t=` + Date.now());
            const json = await res.json();
            if (json.status === 'ok') {
              fetchedData[s.name] = json.data;
            }
          } catch (e) {
            console.warn("Sync failed for sheet:", s.name, e);
          } finally {
            currentPct += s.pctStep;
            if (currentPct > 95) currentPct = 95;
            if (btn) btn.innerHTML = `🔄 ${currentPct}%`;
          }
        });

        await Promise.all(fetchPromises);

        // 1. Process Duties 
        const dRows = fetchedData['0'];
        if (dRows && dRows.length > 1) {
          const dMap = {};
          dRows.slice(1).forEach(r => {
            if (r.length >= 5 && r[1]) dMap[dutyKey(r[1], r[2] || '', r[3] || '')] = r[4];
          });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(dMap));
          dutyMap = dMap;
        }

        // 2. Process Swaps
        const sRows = fetchedData['swap'];
        if (sRows && sRows.length > 1) {
          const sMap = {};
          sRows.slice(1).forEach(r => {
            if (r.length >= 6 && r[1]) {
              sMap[dutyKey(r[1], r[2] || '', r[3] || '')] = {
                original: r[4] || '', requester: r[5] || '', date: r[1], shift: r[2] || '', slot: r[3] || '', savedAt: r[0] || ''
              };
            }
          });
          localStorage.setItem(SWAP_KEY, JSON.stringify(sMap));
          swapMap = sMap;
        }

        // 2.5 Process Staffs
        const stfRows = fetchedData['staff'];
        if (stfRows && stfRows.length > 1) {
          const stfMap = {};
          stfRows.slice(1).forEach(r => {
            if (r.length >= 2 && r[1]) {
              stfMap[r[1]] = { name: r[1], color: r[2] || '#cccccc' };
            }
          });
          if (Object.keys(stfMap).length > 0) {
            localStorage.setItem('staffMap_v1', JSON.stringify(stfMap));
            staffMap = stfMap;
            renderLegend(); // Need to call UI render
          }
        }

        // 3. Process Holidays
        const hData = fetchedData['วันหยุด'];
        if (hData && typeof hData === 'object' && Object.keys(hData).length > 0) {
          holidayMap = { ...HOLIDAY_FALLBACK, ...hData };
          saveHolidayCache();
        } else {
          if (!loadHolidayCache()) holidayMap = { ...HOLIDAY_FALLBACK };
          else holidayMap = { ...HOLIDAY_FALLBACK, ...holidayMap };
        }

        // 4. Process Sells
        const slRows = fetchedData['sell'];
        if (slRows && slRows.length > 1) {
          const newSell = {};
          slRows.slice(1).forEach(r => {
            if (r.length >= 5 && r[1]) {
              newSell[dutyKey(r[1], r[2] || '', r[3] || '')] = { date: r[1], shift: r[2] || '', slot: r[3] || '', seller: r[4] || '', savedAt: r[0] || '' };
            }
          });
          localStorage.setItem('sellMap_v1', JSON.stringify(newSell));
          sellMap = newSell;
        }

        // 5. Process SellTransfers 
        const stRows = fetchedData['sellTransfer'];
        if (stRows && stRows.length > 1) {
          const newST = {};
          stRows.slice(1).forEach(r => {
            if (r.length >= 6 && r[1]) {
              newST[dutyKey(r[1], r[2] || '', r[3] || '')] = { original: r[4] || '', buyer: r[5] || '', date: r[1], shift: r[2] || '', slot: r[3] || '', savedAt: r[0] || '' };
            }
          });
          localStorage.setItem('sellTransferMap_v1', JSON.stringify(newST));
          sellTransferMap = newST;
        }

        // Update successful timestamp
        localStorage.setItem('last_update_time_v1', serverUpdate);

        buildGrid(current.getFullYear(), current.getMonth());
        renderActivityLog();

        if (btn) {
          btn.innerHTML = oldTxt;
          btn.style.opacity = '1';
          btn.disabled = false;
        }
      } catch (err) {
        if (!isAuto) console.log('เกิดข้อผิดพลาดในการดึงข้อมูล: ' + err.message);
        else console.error('Auto sync failed:', err);
        if (btn) {
          btn.innerHTML = oldTxt;
          btn.style.opacity = '1';
          btn.disabled = false;
        }
      }
    }

    // Auto Refresh
    setTimeout(() => syncFromCloud(true), 500);
    setInterval(() => syncFromCloud(true), AUTO_SYNC_MINUTES * 60 * 1000);

    // Auto Update on Focus via LocalStorage
    window.addEventListener('focus', () => {
      dutyMap = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      swapMap = JSON.parse(localStorage.getItem(SWAP_KEY) || '{}');
      sellMap = JSON.parse(localStorage.getItem('sellMap_v1') || '{}');
      sellTransferMap = JSON.parse(localStorage.getItem('sellTransferMap_v1') || '{}');
      staffMap = JSON.parse(localStorage.getItem('staffMap_v1') || 'null') || DEFAULT_STAFF;

      // โหลด holidayMap จาก cache (ถ้ายังไม่หมดอายุ)
      if (loadHolidayCache()) {
        holidayMap = { ...HOLIDAY_FALLBACK, ...holidayMap };
      }

      renderLegend();
      buildGrid(current.getFullYear(), current.getMonth());
      renderActivityLog();
    });

    function renderSwapLog() { renderActivityLog(); } // legacy alias

    /* ─── Buy modal (เลือกคนแทนเวรขาย) ─── */
    let _buyPending = null;

    function openBuyModal(dk, dateStr, shift, slot, seller) {
      _buyPending = { dk, dateStr, shift, slot, seller };
      const shiftDef = SHIFTS.find(s => s.key === shift);
      const d = new Date(dateStr);
      const thaiDate = `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear() + 543}`;
      const slotTxt = shiftDef && shiftDef.slots > 1 ? ` ช่อง ${slot}` : '';
      document.getElementById('buyModalSub').innerHTML =
        `<strong style="color:#ffb74d;">${seller}</strong> ประกาศขาย<br>` +
        `${shiftDef ? shiftDef.icon : ''} เวร${shift}${slotTxt} · ${thaiDate}<br>` +
        `<span style="opacity:.7;font-size:.8rem;">เลือกชื่อคนที่จะมารับแทน</span>`;
      document.querySelectorAll('#buyModalOverlay .staff-btn').forEach(btn => {
        const nameTh = btn.textContent.trim().replace('👤 ', '');
        btn.style.display = nameTh === seller ? 'none' : 'block';
      });
      document.getElementById('buyModalOverlay').classList.add('open');
    }

    function closeBuyModal() {
      document.getElementById('buyModalOverlay').classList.remove('open');
      _buyPending = null;
    }

    function confirmBuy(buyerName) {
      if (!_buyPending) return;
      closeBuyModal();
      const { dk, dateStr, shift, slot, seller } = _buyPending;
      dutyMap[dk] = buyerName;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dutyMap));
      delete sellMap[dk];
      localStorage.setItem('sellMap_v1', JSON.stringify(sellMap));
      const p = { date: dateStr, shift, slot, name: buyerName };
      fetch(GS_URL + '?' + new URLSearchParams(p).toString() + '&t=' + Date.now(), { mode: 'no-cors' }).catch(e => console.warn(e));
      const ps = { action: 'cancelSell', date: dateStr, shift, slot, name: seller };
      fetch(GS_URL + '?' + new URLSearchParams(ps).toString() + '&t=' + Date.now(), { mode: 'no-cors' }).catch(e => console.warn(e));
      buildGrid(current.getFullYear(), current.getMonth());
      renderActivityLog();
      const d = new Date(dateStr);
      const thaiDate = `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear() + 543}`;
      showToast(`✅ ${buyerName} รับเวร${shift} ${thaiDate} แทน ${seller}`);
    }

    document.getElementById('buyModalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeBuyModal();
    });

    /* ─── renderActivityLog — Unified log (แลก + ขาย + ประกาศขาย) ─── */
    const SHIFT_ICONS = { 'เช้า': '☀️', 'บ่าย': '⛅', 'ดึก': '🌙' };

    function renderActivityLog() {
      const logEl = document.getElementById('activityLog');
      const body = document.getElementById('activityBody');
      const items = [];
      const fmtD = ds => { const d = new Date(ds); return `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear() + 543}`; };
      const cancelBtn = (fn, label = '✕ ยกเลิก') =>
        `<button onclick="${fn}" style="padding:3px 10px;border-radius:8px;border:1px solid #e53935;background:rgba(229,57,53,.12);color:#ef9a9a;font-size:.75rem;cursor:pointer;font-family:'Sarabun',sans-serif;">${label}</button>`;

      // 1. Swap entries (แลกเวร)
      const swp = JSON.parse(localStorage.getItem('swapMap_v1') || '{}');
      const swpEntries = Object.entries(swp);
      const seen = new Set();
      swpEntries.forEach(([dk, e]) => {
        if (seen.has(dk)) return;
        const partner = swpEntries.find(([dk2, e2]) => !seen.has(dk2) && dk2 !== dk && e2.original === e.requester && e2.requester === e.original);
        seen.add(dk);
        const pdk = partner ? partner[0] : null;
        if (pdk) seen.add(pdk);
        const pEntry = partner ? partner[1] : null;
        const dksArg = pdk ? `${dk}||${pdk}` : dk;
        const slotTxt = parseInt(e.slot) > 1 ? ' ช่อง ' + e.slot : '';
        items.push({
          sortDate: e.date,
          row: '<td>' + fmtD(e.date) + '</td>'
            + '<td>' + (e.shift) + slotTxt + '</td>'
            + '<td><span style="background:#00897b;color:#fff;font-size:.62rem;padding:1px 7px;border-radius:6px;font-weight:700;">แลก</span></td>'
            + '<td style="font-size:.85rem;"><span style="text-decoration:line-through;opacity:.55;">' + e.original + '</span>'
            + ' <span style="opacity:.4;margin:0 4px;">→</span> '
            + '<strong style="color:#4db6ac;">' + e.requester + '</strong>'
            + (pEntry ? ' <span style="opacity:.5;font-size:.75rem;">(เวร' + pEntry.shift + ' ' + fmtD(pEntry.date) + ')</span>' : '')
            + '</td>'
            + '<td>' + cancelBtn("cancelSwapItem('" + dksArg.replace(/'/g, "\\'") + "')") + '</td>'
        });

      });

      // 2. Sell Transfer (ขายเวรสำเร็จ — มีคนรับแล้ว)
      Object.entries(sellTransferMap).forEach(([dk, e]) => {
        items.push({
          sortDate: e.date,
          row: '<td>' + fmtD(e.date) + '</td>'
            + '<td>' + (e.shift) + (parseInt(e.slot) > 1 ? ' ช่อง ' + e.slot : '') + '</td>'
            + '<td><span style="background:#e65100;color:#fff;font-size:.62rem;padding:1px 7px;border-radius:6px;font-weight:700;">ขาย</span></td>'
            + '<td style="font-size:.85rem;"><span style="text-decoration:line-through;opacity:.55;">' + e.original + '</span> <span style="opacity:.4;margin:0 4px;">→</span> <strong style="color:#ffb74d;">' + e.buyer + '</strong></td>'
            + '<td>' + cancelBtn("cancelSellTransfer('" + dk + "','" + e.original + "','" + e.date + "','" + e.shift + "','" + e.slot + "')") + '</td>'
        });
      });

      // 3. Sell Announced (ประกาศขาย — ยังหาคนแทน)
      Object.entries(sellMap).forEach(([dk, e]) => {
        items.push({
          sortDate: e.date,
          row: '<td>' + fmtD(e.date) + '</td>'
            + '<td>' + (e.shift) + (parseInt(e.slot) > 1 ? ' ช่อง ' + e.slot : '') + '</td>'
            + '<td><span style="background:#bf360c;color:#fff;font-size:.62rem;padding:1px 7px;border-radius:6px;font-weight:700;">หาคนแทน</span></td>'
            + '<td style="font-size:.85rem;"><strong style="color:#ffb74d;">' + e.seller + '</strong> <span style="opacity:.55;">หาคนรับแทน...</span></td>'
            + '<td>' + cancelBtn("cancelSellItem('" + dk + "','" + e.date + "','" + e.shift + "','" + e.slot + "','" + e.seller + "')") + '</td>'
        });
      });

      if (!items.length) { logEl.style.display = 'none'; return; }
      logEl.style.display = 'block';
      document.getElementById('activityCount').textContent = `(${items.length} รายการ)`;

      // เรียงตามวันที่
      items.sort((a, b) => a.sortDate.localeCompare(b.sortDate));
      body.innerHTML = items.map(it => `<tr>${it.row}</tr>`).join('');
    }

    /* ─── Cancel functions ─── */
    function cancelSwapItem(dksRaw) {
      const dks = dksRaw.split('||');
      dks.forEach(dk => { delete swapMap[dk]; });
      localStorage.setItem(SWAP_KEY, JSON.stringify(swapMap));
      const p = { action: 'cancelSwap', dks: dksRaw };
      fetch(GS_URL + '?' + new URLSearchParams(p).toString() + '&t=' + Date.now(), { mode: 'no-cors' }).catch(e => console.warn(e));
      buildGrid(current.getFullYear(), current.getMonth());
      renderActivityLog();
      showToast('↩ ยกเลิกการแลกเวรแล้ว');
    }

    function cancelSellTransfer(dk, origSeller, date, shift, slot) {
      // คืนเวรให้ผู้ขายเดิม
      dutyMap[dk] = origSeller;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dutyMap));
      delete sellTransferMap[dk];
      localStorage.setItem('sellTransferMap_v1', JSON.stringify(sellTransferMap));
      // อัปเดต duty sheet + ลบจาก sellTransfer sheet
      const p = { date, shift, slot, name: origSeller };
      fetch(GS_URL + '?' + new URLSearchParams(p).toString() + '&t=' + Date.now(), { mode: 'no-cors' }).catch(e => console.warn(e));
      const p2 = { action: 'cancelSellTransfer', date, shift, slot, seller: origSeller };
      fetch(GS_URL + '?' + new URLSearchParams(p2).toString() + '&t=' + Date.now(), { mode: 'no-cors' }).catch(e => console.warn(e));
      buildGrid(current.getFullYear(), current.getMonth());
      renderActivityLog();
      showToast(`↩ ยกเลิกการขายเวร — คืนเวรให้ ${origSeller}`);
    }

    function cancelSellItem(dk, date, shift, slot, seller) {
      delete sellMap[dk];
      localStorage.setItem('sellMap_v1', JSON.stringify(sellMap));
      const p = { action: 'cancelSell', date, shift, slot, name: seller };
      fetch(GS_URL + '?' + new URLSearchParams(p).toString() + '&t=' + Date.now(), { mode: 'no-cors' }).catch(e => console.warn(e));
      buildGrid(current.getFullYear(), current.getMonth());
      renderActivityLog();
      showToast('↩ ยกเลิกการประกาศขายเวรแล้ว');
    }
  </script>
</body>
